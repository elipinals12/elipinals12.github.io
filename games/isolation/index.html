<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Isolation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --screen-pad: clamp(8px, 2.2vmin, 18px);
  --bg:        #0b0e16;
  --bg-2:      #131826;
  --panel:     #161c2c;
  --panel-2:   #1d2438;
  --border:    #283049;
  --border-2:  #364264;
  --text:      #e8ecf5;
  --text-dim:  #8b95b3;
  --text-mute: #5a6688;

  --slate:      #3a4566;   /* board frame + starting squares */
  --slate-2:    #2a334d;   /* slightly darker for depth */
  --tile:       #1c2746;   /* dark blue tiles (darker than slate, lighter than abyss) */
  --tile-hover: #243056;

  --p1:        #3b82f6;
  --p1-soft:   rgba(59, 130, 246, 0.35);
  --p1-glow:   rgba(59, 130, 246, 0.55);
  --p2:        #ef4444;
  --p2-soft:   rgba(239, 68, 68, 0.35);
  --p2-glow:   rgba(239, 68, 68, 0.55);
  --accent:    #818cf8;
  --warn:      #fb923c;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(ellipse at top, #161c2c 0%, #0b0e16 60%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-feature-settings: 'ss01', 'cv11';
  -webkit-font-smoothing: antialiased;
}

/* Background grain texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.06), transparent 50%),
                    radial-gradient(circle at 80% 70%, rgba(239,68,68,0.06), transparent 50%);
  z-index: 0;
}

.screen {
  display: none;
  min-height: 100vh;
  min-height: 100dvh;
  padding: var(--screen-pad);
  position: relative;
  z-index: 1;
}
.screen.active { display: flex; flex-direction: column; align-items: center; }

/* ===== MAIN MENU ===== */
.menu { justify-content: center; }
.menu-card {
  background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 36px 32px 32px;
  max-width: 460px;
  width: 100%;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  position: relative;
  overflow: hidden;
}
.menu-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}

.title {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 56px;
  font-weight: 400;
  text-align: center;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 4px;
  background: linear-gradient(135deg, #fff 0%, #c7d0e8 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.04em;
  margin-bottom: 28px;
  text-transform: uppercase;
}

.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-mute);
  margin-bottom: 8px;
  font-weight: 600;
}
.field input[type="text"] {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.field input:focus { border-color: var(--accent); background: #161d33; }

.seg {
  display: flex;
  gap: 4px;
  background: var(--bg-2);
  padding: 4px;
  border-radius: 12px;
  border: 1px solid var(--border);
}
.seg button {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-dim);
  padding: 10px 8px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  letter-spacing: 0.02em;
  transition: all 0.18s;
}
.seg button:hover { color: var(--text); }
.seg button.active {
  background: linear-gradient(135deg, var(--accent), #6366f1);
  color: white;
  box-shadow: 0 2px 12px rgba(129,140,248,0.3);
}

.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--p1) 0%, var(--accent) 100%);
  border: none;
  color: white;
  padding: 14px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  letter-spacing: 0.02em;
  cursor: pointer;
  margin-top: 12px;
  transition: transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(59,130,246,0.3);
}
.btn-primary:hover { box-shadow: 0 6px 26px rgba(59,130,246,0.45); }
.btn-primary:active { transform: scale(0.985); }

/* ===== GAME SCREEN ===== */
.game {
  gap: clamp(8px, 1.8vmin, 12px);
  max-width: 720px;
  margin: 0 auto;
  width: 100%;
}

.top-bar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 12px;
  gap: 10px;
  flex-wrap: wrap;
}

.scores { display: flex; gap: 8px; align-items: center; flex: 1; min-width: 0; }
.score-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 11px;
  font-size: 13px;
  transition: border-color 0.3s, box-shadow 0.3s;
  min-width: 0;
}
.score-box.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(129,140,248,0.18);
}
.score-box.p1.active { border-color: var(--p1); box-shadow: 0 0 0 2px var(--p1-soft); }
.score-box.p2.active { border-color: var(--p2); box-shadow: 0 0 0 2px var(--p2-soft); }
.score-box .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 8px currentColor;
}
.score-box.p1 .dot { background: var(--p1); color: var(--p1); }
.score-box.p2 .dot { background: var(--p2); color: var(--p2); }
.score-box .name {
  color: var(--text);
  font-weight: 600;
  max-width: 84px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.score-box .wins {
  font-family: 'Geist Mono', monospace;
  color: var(--text-dim);
  font-weight: 600;
  padding-left: 8px;
  border-left: 1px solid var(--border);
}

.timer {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  font-family: 'Geist Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.04em;
}

.phase {
  width: 100%;
  text-align: center;
  padding: 12px 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-dim);
  transition: border-color 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}
.phase .pname { font-weight: 700; }
.phase.p1 .pname { color: var(--p1); }
.phase.p2 .pname { color: var(--p2); }
.phase .action { color: var(--text); font-weight: 600; }
.phase .sep { color: var(--text-mute); margin: 0 2px; }
.phase.thinking {
  color: var(--warn);
  font-style: italic;
}

/* ===== BOARD ===== */
.board-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  perspective: 1200px;
  flex: 1 1 auto;
  min-height: 0;
}

.board-frame {
  width: min(100%, clamp(180px, min(calc(100vw - (2 * var(--screen-pad))), calc((100dvh - 238px) * 0.75)), 720px));
  max-width: 100%;
  background: var(--slate);
  border-radius: 10px;
  padding: clamp(4px, 1.4vmin, 8px);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.5),
    0 0 0 1px var(--slate-2),
    inset 0 1px 0 rgba(255,255,255,0.06);
  transition: transform 0.55s cubic-bezier(0.65, 0, 0.35, 1);
  transform-style: preserve-3d;
}
.board-frame.rotated { transform: rotateZ(180deg); }

.board {
  width: 100%;
  aspect-ratio: 6 / 8;
  background: #000;
  border-radius: 4px;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(8, 1fr);
  gap: clamp(1px, 0.55vmin, 3px);
  position: relative;
  overflow: hidden;
}

.tile {
  background: var(--tile);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: default;
  transition: background 0.18s, opacity 0.35s ease, transform 0.35s;
  touch-action: none;
}
.tile.start {
  background: var(--slate);
}
.tile.removed {
  background: transparent !important;
  pointer-events: none;
  opacity: 0;
  transform: scale(0.6);
}
.tile.can-move {
  cursor: pointer;
}
.tile.can-move::after {
  content: '';
  position: absolute;
  width: 28%;
  height: 28%;
  border-radius: 50%;
  background: rgba(99, 102, 241, 0.35);
  box-shadow: 0 0 14px rgba(99,102,241,0.5);
  pointer-events: none;
  animation: pulseMove 1.4s ease-in-out infinite;
}
@keyframes pulseMove {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.25); opacity: 1; }
}
.tile.can-remove { cursor: crosshair; }
.tile.can-remove:hover { background: #7f1d1d; }
.tile.can-remove::before {
  content: '';
  position: absolute;
  inset: 0;
  border: 2px dashed rgba(239, 68, 68, 0.5);
  opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
}
.tile.can-remove:hover::before { opacity: 1; }

/* Pawns */
.pawn {
  width: 64%;
  aspect-ratio: 1;
  border-radius: 50%;
  position: relative;
  cursor: grab;
  z-index: 2;
  transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
.pawn.p1 {
  background: radial-gradient(circle at 35% 30%, #93c5fd 0%, var(--p1) 55%, #1d4ed8 100%);
  box-shadow:
    0 0 20px var(--p1-soft),
    inset 0 -4px 8px rgba(0,0,0,0.3),
    inset 0 3px 6px rgba(255,255,255,0.25);
}
.pawn.p2 {
  background: radial-gradient(circle at 35% 30%, #fca5a5 0%, var(--p2) 55%, #991b1b 100%);
  box-shadow:
    0 0 20px var(--p2-soft),
    inset 0 -4px 8px rgba(0,0,0,0.3),
    inset 0 3px 6px rgba(255,255,255,0.25);
}
.pawn.dragging {
  cursor: grabbing;
  z-index: 100;
  transition: none;
  transform: scale(1.1);
}
.pawn.active.p1 { animation: pulseP1 1.6s ease-in-out infinite; }
.pawn.active.p2 { animation: pulseP2 1.6s ease-in-out infinite; }
@keyframes pulseP1 {
  0%, 100% { box-shadow: 0 0 18px var(--p1-soft), inset 0 -4px 8px rgba(0,0,0,0.3), inset 0 3px 6px rgba(255,255,255,0.25); }
  50% { box-shadow: 0 0 30px var(--p1-glow), inset 0 -4px 8px rgba(0,0,0,0.3), inset 0 3px 6px rgba(255,255,255,0.25); }
}
@keyframes pulseP2 {
  0%, 100% { box-shadow: 0 0 18px var(--p2-soft), inset 0 -4px 8px rgba(0,0,0,0.3), inset 0 3px 6px rgba(255,255,255,0.25); }
  50% { box-shadow: 0 0 30px var(--p2-glow), inset 0 -4px 8px rgba(0,0,0,0.3), inset 0 3px 6px rgba(255,255,255,0.25); }
}

/* Counter-rotate pawns so they always read upright */
.board-frame.rotated .pawn { transform: rotateZ(180deg); }
.board-frame.rotated .pawn.dragging { transform: rotateZ(180deg) scale(1.1); }

/* ===== CONTROLS ===== */
.controls {
  width: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
  align-items: center;
  gap: 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
}
.controls .toggle-row { justify-self: start; grid-column: 1; }
.controls .btn-group  { justify-self: center; grid-column: 2; }
.controls .ctrl-spacer { grid-column: 3; }
.toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text-dim);
  font-weight: 500;
}
.switch {
  position: relative;
  width: 40px;
  height: 22px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 11px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.switch::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: var(--text-mute);
  border-radius: 50%;
  transition: left 0.22s cubic-bezier(0.65,0,0.35,1), background 0.2s;
}
.switch.on { background: var(--accent); border-color: var(--accent); }
.switch.on::after { left: 20px; background: white; }

.btn-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.btn {
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 14px;
  border-radius: 9px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.18s, border-color 0.18s;
}
.btn:hover { background: var(--border); border-color: var(--border-2); }
.btn.pulsing {
  background: linear-gradient(135deg, var(--p1), var(--accent));
  color: white;
  border-color: transparent;
  animation: btnPulse 1.8s ease-in-out infinite;
}
@keyframes btnPulse {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(129,140,248,0.55), 0 2px 10px rgba(99,102,241,0.25);
  }
  50% {
    box-shadow: 0 0 0 10px rgba(129,140,248,0), 0 2px 14px rgba(99,102,241,0.45);
  }
}

/* ===== WIN MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,11,20,0.78);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 24px;
  transition: background 0.9s ease, backdrop-filter 0.9s ease;
}
.modal-overlay.active { display: flex; }
.modal-overlay.faded {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
}

.modal {
  /* Two-background trick: inner panel + gradient ring all the way around */
  background:
    linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%) padding-box,
    linear-gradient(135deg, var(--p1), var(--accent), var(--p2)) border-box;
  border: 2px solid transparent;
  border-radius: 22px;
  padding: 40px 32px 28px;
  text-align: center;
  max-width: 420px;
  width: 100%;
  animation: popIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  z-index: 202;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}
.modal.p2win {
  background:
    linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%) padding-box,
    linear-gradient(135deg, var(--p2), #fb923c, var(--accent)) border-box;
}

@keyframes popIn {
  0% { transform: scale(0.4) rotate(-6deg); opacity: 0; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.modal .crown {
  font-size: 64px;
  margin-bottom: 10px;
  animation: bounce 1.6s ease-in-out infinite;
  display: inline-block;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.modal h2 {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 38px;
  font-weight: 400;
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.modal .winner-name {
  background: linear-gradient(135deg, var(--p1), var(--accent));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 600;
}
.modal.p2win .winner-name {
  background: linear-gradient(135deg, var(--p2), #f97316);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.modal p {
  color: var(--text-dim);
  margin-bottom: 24px;
  font-size: 14px;
}
.modal .actions {
  display: flex;
  gap: 10px;
}
.modal .actions button { flex: 1; }
.modal .actions .btn { padding: 12px; }
.modal .actions .btn-primary { margin-top: 0; padding: 12px; font-size: 14px; }

.confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 201;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 540px) {
  .title { font-size: 44px; }
  .menu-card { padding: 28px 22px 24px; }
  .top-bar { padding: 8px 10px; gap: 6px; }
  .score-box { padding: 6px 9px; font-size: 12px; gap: 6px; }
  .score-box .name { max-width: 64px; }
  .timer { padding: 6px 10px; font-size: 13px; }
  .phase { padding: 10px 12px; font-size: 13px; }
  .controls { padding: 8px 10px; }
  .btn { padding: 8px 12px; font-size: 12px; }
  .toggle-row { font-size: 12px; }
  .modal { padding: 32px 22px 22px; }
  .modal h2 { font-size: 30px; }
}


@media (max-width: 420px) {
  .top-bar { align-items: stretch; }
  .scores { width: 100%; flex: 1 1 100%; justify-content: center; }
  .timer { margin: 0 auto; }
  .controls {
    grid-template-columns: 1fr;
    justify-items: center;
    gap: 8px;
  }
  .controls .toggle-row,
  .controls .btn-group,
  .controls .ctrl-spacer {
    grid-column: 1;
    justify-self: center;
  }
  .controls .ctrl-spacer { display: none; }
}

@media (max-height: 620px) {
  .game { gap: 6px; }
  .top-bar, .phase, .controls { padding-top: 6px; padding-bottom: 6px; }
  .phase { font-size: 12px; }
  .score-box { padding-top: 5px; padding-bottom: 5px; }
  .board-frame { width: min(100%, clamp(150px, min(calc(100vw - (2 * var(--screen-pad))), calc((100dvh - 190px) * 0.75)), 720px)); }
}

@media (pointer: coarse) {
  .tile.can-remove::before { opacity: 0.65; }
  .btn, .seg button { min-height: 40px; }
  .switch { min-width: 44px; min-height: 26px; }
  .switch::after { top: 4px; }
  .switch.on::after { left: 24px; }
}

</style>
</head>
<body>

<!-- ===== MAIN MENU ===== -->
<div id="menu-screen" class="screen menu active">
  <div class="menu-card">
    <div class="title">Isolation</div>
    <div class="subtitle">Move · Remove · Trap</div>

    <div class="field">
      <label>Game Mode</label>
      <div class="seg" id="mode-seg">
        <button data-mode="2p" class="active">2 Players</button>
        <button data-mode="cpu">vs Computer</button>
      </div>
    </div>

    <div class="field" id="diff-field" style="display:none">
      <label>Difficulty</label>
      <div class="seg" id="diff-seg">
        <button data-diff="easy">Easy</button>
        <button data-diff="medium" class="active">Medium</button>
        <button data-diff="hard">Hard</button>
      </div>
    </div>

    <div class="field">
      <label id="p1-label">Player 1 Name</label>
      <input type="text" id="p1-input" value="Player 1" maxlength="16" autocomplete="off" />
    </div>

    <div class="field" id="p2-field">
      <label>Player 2 Name</label>
      <input type="text" id="p2-input" value="Player 2" maxlength="16" autocomplete="off" />
    </div>

    <button class="btn-primary" id="start-btn">Start Game</button>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen" class="screen game">
  <div class="top-bar">
    <div class="scores">
      <div class="score-box p1" id="score-p1">
        <span class="dot"></span>
        <span class="name" id="s1-name">Player 1</span>
        <span class="wins" id="s1-wins">0</span>
      </div>
      <div class="score-box p2" id="score-p2">
        <span class="dot"></span>
        <span class="name" id="s2-name">Player 2</span>
        <span class="wins" id="s2-wins">0</span>
      </div>
    </div>
    <div class="timer" id="timer">00:00</div>
  </div>

  <div class="phase" id="phase-text"></div>

  <div class="board-wrap">
    <div class="board-frame" id="board-frame">
      <div class="board" id="board"></div>
    </div>
  </div>

  <div class="controls">
    <div class="toggle-row" id="rotate-toggle-row">
      <span>Auto-rotate</span>
      <div class="switch" id="rotate-switch"></div>
    </div>
    <div class="btn-group">
      <button class="btn" id="new-game-btn">New Game</button>
      <button class="btn" id="menu-btn">Main Menu</button>
    </div>
    <div class="ctrl-spacer"></div>
  </div>
</div>

<!-- ===== WIN MODAL ===== -->
<div class="modal-overlay" id="win-modal">
  <canvas class="confetti-canvas" id="confetti"></canvas>
  <div class="modal" id="modal-inner">
    <div class="crown">👑</div>
    <h2><span class="winner-name" id="winner-name">Player</span> Wins</h2>
    <p id="win-reason">Opponent has no legal moves.</p>
  </div>
</div>

<script>
/* =========================================================
   ISOLATION — full game logic
   ========================================================= */

const ROWS = 8, COLS = 6;
const P1_START = { r: 0, c: 3 };
const P2_START = { r: 7, c: 2 };

// ---------- App state ----------
let mode = '2p';           // '2p' | 'cpu'
let difficulty = 'medium'; // 'easy' | 'medium' | 'hard'
let p1Name = 'Player 1', p2Name = 'Player 2';
let scores = { p1: 0, p2: 0 };
let autoRotate = false;
let aiThinking = false;
let timerInt = null;
let totalSeconds = 0;

// ---------- Game state ----------
let game = null;
function newGameState() {
  return {
    removed: Array.from({ length: ROWS }, () => Array(COLS).fill(false)),
    p1: { ...P1_START },
    p2: { ...P2_START },
    current: 1,        // whose turn
    phase: 'move',     // 'move' | 'remove'
    over: false,
  };
}

// ---------- Helpers ----------
const isStart = (r, c) => (r === P1_START.r && c === P1_START.c) || (r === P2_START.r && c === P2_START.c);
const inBounds = (r, c) => r >= 0 && r < ROWS && c >= 0 && c < COLS;
const opponentOf = (p) => p === 1 ? 2 : 1;

function getKingMoves(pos, removed, other) {
  const moves = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (!dr && !dc) continue;
      const r = pos.r + dr, c = pos.c + dc;
      if (!inBounds(r, c)) continue;
      if (removed[r][c]) continue;
      if (r === other.r && c === other.c) continue;
      moves.push({ r, c });
    }
  }
  return moves;
}

function bfsReachCount(start, removed, other) {
  const seen = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  seen[start.r][start.c] = true;
  const stack = [start];
  let count = 0;
  while (stack.length) {
    const p = stack.pop();
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const r = p.r + dr, c = p.c + dc;
        if (!inBounds(r, c) || seen[r][c] || removed[r][c]) continue;
        if (r === other.r && c === other.c) continue;
        seen[r][c] = true;
        count++;
        stack.push({ r, c });
      }
    }
  }
  return count;
}

// ---------- AI (P2) ----------

// Count tiles that are still legal removal targets.
function countRemainingRemovableTiles() {
  let n = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (game.removed[r][c]) continue;
      if (isStart(r, c)) continue;
      if (r === game.p1.r && c === game.p1.c) continue;
      if (r === game.p2.r && c === game.p2.c) continue;
      n++;
    }
  }
  return n;
}

// Difficulty tuning: one search ply = AI/human moves, then removes one tile.
// Easy is intentionally weak and noisy. Medium searches decently but still
// makes imperfect choices. Hard searches much wider/deeper and considers the
// whole board for removals instead of mostly local tiles.
function getAIParams(diff, remTiles) {
  if (diff === 'easy') {
    if (remTiles > 38) return { depth: 1, bfsDist: 3, maxCands: 6,  randomness: 0.95, slop: 0.75, fullBoardRemove: false };
    if (remTiles > 26) return { depth: 1, bfsDist: 3, maxCands: 7,  randomness: 0.80, slop: 0.65, fullBoardRemove: false };
    if (remTiles > 14) return { depth: 1, bfsDist: 4, maxCands: 8,  randomness: 0.60, slop: 0.50, fullBoardRemove: false };
    return                       { depth: 2, bfsDist: 4, maxCands: 8,  randomness: 0.40, slop: 0.40, fullBoardRemove: false };
  }

  if (diff === 'medium') {
    if (remTiles > 38) return { depth: 2, bfsDist: 6, maxCands: 12, randomness: 0.85, slop: 0.35, fullBoardRemove: false };
    if (remTiles > 28) return { depth: 2, bfsDist: 7, maxCands: 14, randomness: 0.45, slop: 0.25, fullBoardRemove: false };
    if (remTiles > 16) return { depth: 3, bfsDist: 8, maxCands: 18, randomness: 0.18, slop: 0.15, fullBoardRemove: false };
    return                       { depth: 4, bfsDist: 99, maxCands: 24, randomness: 0.06, slop: 0.08, fullBoardRemove: true  };
  }

  // Hard: no intentional mistakes, deeper search, and full-board removal search.
  // The candidate cap is widened as the board shrinks so hard can see traps,
  // bridges, far-away cuts, and endgame forced wins much earlier.
  if (remTiles > 40) return { depth: 3, bfsDist: 99, maxCands: 24,   randomness: 0.02, slop: 0.00, fullBoardRemove: true };
  if (remTiles > 30) return { depth: 4, bfsDist: 99, maxCands: 24,   randomness: 0.00, slop: 0.00, fullBoardRemove: true };
  if (remTiles > 22) return { depth: 4, bfsDist: 99, maxCands: 36,   randomness: 0.00, slop: 0.00, fullBoardRemove: true };
  if (remTiles > 14) return { depth: 5, bfsDist: 99, maxCands: 9999, randomness: 0.00, slop: 0.00, fullBoardRemove: true };
  if (remTiles > 7)  return { depth: 6, bfsDist: 99, maxCands: 9999, randomness: 0.00, slop: 0.00, fullBoardRemove: true };
  return                       { depth: 8, bfsDist: 99, maxCands: 9999, randomness: 0.00, slop: 0.00, fullBoardRemove: true };
}

function legalRemovalTiles(removed, a, b) {
  const out = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (removed[r][c]) continue;
      if (isStart(r, c)) continue;
      if (r === a.r && c === a.c) continue;
      if (r === b.r && c === b.c) continue;
      out.push({ r, c });
    }
  }
  return out;
}

// BFS through unremoved squares from the victim. For limited modes, this keeps
// search fast. For hard mode, this is widened to full-board removal search.
function bfsCandidates(removed, remover, victim, maxDist, maxCount) {
  const dist = Array.from({ length: ROWS }, () => Array(COLS).fill(-1));
  dist[victim.r][victim.c] = 0;
  const q = [[victim.r, victim.c]];
  let head = 0;
  while (head < q.length) {
    const [r0, c0] = q[head++];
    const d = dist[r0][c0];
    if (d >= maxDist) continue;
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const r = r0 + dr, c = c0 + dc;
        if (!inBounds(r, c) || removed[r][c]) continue;
        if (r === remover.r && c === remover.c) continue;
        if (dist[r][c] !== -1) continue;
        dist[r][c] = d + 1;
        q.push([r, c]);
      }
    }
  }

  const bands = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (dist[r][c] <= 0) continue;
      if (removed[r][c]) continue;
      if (isStart(r, c)) continue;
      const d = dist[r][c];
      if (!bands[d]) bands[d] = [];
      bands[d].push({ r, c, _d: d });
    }
  }

  const result = [];
  const usedBands = bands.filter(Boolean);
  if (usedBands.length === 0) return [];
  let idx = 0;
  while (result.length < (maxCount || 9999)) {
    let added = false;
    for (const band of usedBands) {
      if (band[idx]) {
        result.push(band[idx]);
        if (maxCount && result.length >= maxCount) { added = true; break; }
        added = true;
      }
    }
    if (!added) break;
    idx++;
  }
  return result;
}

function distTo(a, b) {
  return Math.max(Math.abs(a.r - b.r), Math.abs(a.c - b.c));
}

// Scores how much a removal hurts the victim while preserving the remover's space.
function scoreRemovalForPlayer(removed, remover, victim, rm) {
  const beforeVictimMoves = getKingMoves(victim, removed, remover).length;
  const beforeVictimReach = bfsReachCount(victim, removed, remover);
  const beforeSelfReach = bfsReachCount(remover, removed, victim);

  removed[rm.r][rm.c] = true;
  const afterVictimMoves = getKingMoves(victim, removed, remover).length;
  const afterVictimReach = bfsReachCount(victim, removed, remover);
  const afterSelfReach = bfsReachCount(remover, removed, victim);
  removed[rm.r][rm.c] = false;

  if (afterVictimMoves === 0) return 100000;

  const mobilityHit = (beforeVictimMoves - afterVictimMoves) * 55;
  const reachHit = (beforeVictimReach - afterVictimReach) * 7;
  const selfDamage = Math.max(0, beforeSelfReach - afterSelfReach) * -4;
  const nearVictim = Math.max(0, 6 - distTo(rm, victim)) * 3;
  const bridgeCut = afterVictimReach <= Math.max(5, beforeVictimReach * 0.55) ? 35 : 0;
  const edgeTrap = (rm.r === 0 || rm.r === ROWS - 1 || rm.c === 0 || rm.c === COLS - 1) ? 3 : 0;

  return mobilityHit + reachHit + selfDamage + nearVictim + bridgeCut + edgeTrap;
}

function getRemovalCandidates(removed, remover, victim, params) {
  let pool;
  if (params.fullBoardRemove) {
    pool = legalRemovalTiles(removed, remover, victim);
  } else {
    pool = bfsCandidates(removed, remover, victim, params.bfsDist, params.maxCands * 2);
    const seen = new Set(pool.map(x => x.r + ',' + x.c));
    for (const t of legalRemovalTiles(removed, remover, victim)) {
      if (pool.length >= params.maxCands * 2) break;
      const k = t.r + ',' + t.c;
      if (!seen.has(k)) pool.push(t);
    }
  }

  return pool
    .map(t => ({ ...t, _score: scoreRemovalForPlayer(removed, remover, victim, t) }))
    .sort((a, b) => b._score - a._score)
    .slice(0, params.maxCands || 9999);
}

function isEdgeTile(p) {
  return p.r === 0 || p.r === ROWS - 1 || p.c === 0 || p.c === COLS - 1;
}

function localLiberties(pos, removed, other) {
  return getKingMoves(pos, removed, other).length;
}

function reachableEdges(pos, removed, other) {
  const seen = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  seen[pos.r][pos.c] = true;
  const stack = [pos];
  let edges = 0;
  while (stack.length) {
    const p = stack.pop();
    if (isEdgeTile(p)) edges++;
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const r = p.r + dr, c = p.c + dc;
        if (!inBounds(r, c) || seen[r][c] || removed[r][c]) continue;
        if (r === other.r && c === other.c) continue;
        seen[r][c] = true;
        stack.push({ r, c });
      }
    }
  }
  return edges;
}

function evalBoard(removed, ai, hum) {
  const aiMoves = localLiberties(ai, removed, hum);
  const humMoves = localLiberties(hum, removed, ai);
  if (humMoves === 0) return 100000;
  if (aiMoves === 0) return -100000;

  const aiReach = bfsReachCount(ai, removed, hum);
  const humReach = bfsReachCount(hum, removed, ai);
  const aiEdges = reachableEdges(ai, removed, hum);
  const humEdges = reachableEdges(hum, removed, ai);

  const mobility = (aiMoves - humMoves) * 20;
  const territory = (aiReach - humReach) * 5;
  const escapeEdges = (aiEdges - humEdges) * 2.5;

  // Nonlinear trap pressure: hard heavily values collapsing the human's region.
  const humTrap = humReach <= 10 ? (11 - humReach) * (11 - humReach) * 5 : 0;
  const aiTrapPenalty = aiReach <= 10 ? -(11 - aiReach) * (11 - aiReach) * 6 : 0;
  const humMobTrap = humMoves <= 3 ? (4 - humMoves) * 45 : 0;
  const aiMobTrapPenalty = aiMoves <= 3 ? -(4 - aiMoves) * 55 : 0;

  const distance = distTo(ai, hum);
  const spacing = distance <= 1 ? -10 : Math.min(distance, 5) * 2;

  return mobility + territory + escapeEdges + humTrap + aiTrapPenalty + humMobTrap + aiMobTrapPenalty + spacing;
}

function stateKey(removed, ai, hum, aiTurn, depth) {
  let bits = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) bits += removed[r][c] ? '1' : '0';
  }
  return bits + '|' + ai.r + ',' + ai.c + '|' + hum.r + ',' + hum.c + '|' + (aiTurn ? 1 : 0) + '|' + depth;
}

function minimax(removed, ai, hum, aiTurn, depth, alpha, beta, params) {
  const key = stateKey(removed, ai, hum, aiTurn, depth);
  if (params.tt && params.tt.has(key)) return params.tt.get(key);

  const mover = aiTurn ? ai : hum;
  const other = aiTurn ? hum : ai;
  const moves = getKingMoves(mover, removed, other);
  if (moves.length === 0) return aiTurn ? -100000 - depth : 100000 + depth;
  if (depth === 0) return evalBoard(removed, ai, hum);

  moves.sort((a, b) => {
    const aScore = getKingMoves(a, removed, other).length + bfsReachCount(a, removed, other) * 0.1 - distTo(a, other) * 0.05;
    const bScore = getKingMoves(b, removed, other).length + bfsReachCount(b, removed, other) * 0.1 - distTo(b, other) * 0.05;
    return aiTurn ? bScore - aScore : aScore - bScore;
  });

  let best = aiTurn ? -Infinity : Infinity;
  for (const mv of moves) {
    const sR = mover.r, sC = mover.c;
    mover.r = mv.r; mover.c = mv.c;

    const rems = getRemovalCandidates(removed, mover, other, params);
    if (rems.length === 0) {
      const v = evalBoard(removed, ai, hum);
      best = aiTurn ? Math.max(best, v) : Math.min(best, v);
    }

    for (const rm of rems) {
      removed[rm.r][rm.c] = true;
      const v = minimax(removed, ai, hum, !aiTurn, depth - 1, alpha, beta, params);
      removed[rm.r][rm.c] = false;

      if (aiTurn) {
        if (v > best) best = v;
        if (best > alpha) alpha = best;
      } else {
        if (v < best) best = v;
        if (best < beta) beta = best;
      }
      if (beta <= alpha) break;
    }
    mover.r = sR; mover.c = sC;
    if (beta <= alpha) break;
  }

  if (params.tt) params.tt.set(key, best);
  return best;
}

// Weak/random move for easy mode and opening imperfection.
function pickReasonable(ai, hum, params) {
  const moves = getKingMoves(ai, game.removed, hum);
  if (moves.length === 0) return null;

  const safeMoves = moves.filter(m => {
    const sR = ai.r, sC = ai.c;
    ai.r = m.r; ai.c = m.c;
    const mob = getKingMoves(ai, game.removed, hum).length;
    ai.r = sR; ai.c = sC;
    return mob > 0;
  });
  const pool = safeMoves.length ? safeMoves : moves;
  const movePick = pool[Math.floor(Math.random() * pool.length)];

  const sR = ai.r, sC = ai.c;
  ai.r = movePick.r; ai.c = movePick.c;
  const allRems = legalRemovalTiles(game.removed, ai, hum);
  ai.r = sR; ai.c = sC;

  let remPick = null;
  if (allRems.length) {
    if (Math.random() < 0.55) {
      remPick = allRems[Math.floor(Math.random() * allRems.length)];
    } else {
      allRems.sort((a, b) => scoreRemovalForPlayer(game.removed, ai, hum, b) - scoreRemovalForPlayer(game.removed, ai, hum, a));
      remPick = allRems[Math.floor(Math.random() * Math.min(6, allRems.length))];
    }
  }
  return { move: movePick, remove: remPick };
}

function chooseWithSlop(scored, slop) {
  if (!scored.length) return null;
  scored.sort((a, b) => b.val - a.val);
  if (!slop) return scored[0];

  const topN = Math.min(scored.length, 4);
  let best = null;
  let bestNoisy = -Infinity;
  for (let i = 0; i < topN; i++) {
    const noise = (Math.random() - 0.5) * slop * 120;
    const penalty = i * slop * 10;
    const noisy = scored[i].val + noise - penalty;
    if (noisy > bestNoisy) { bestNoisy = noisy; best = scored[i]; }
  }
  return best || scored[0];
}

function aiChooseTurn() {
  const ai = game.p2, hum = game.p1;
  const allMoves = getKingMoves(ai, game.removed, hum);
  if (allMoves.length === 0) return null;

  const remTiles = countRemainingRemovableTiles();
  const params = getAIParams(difficulty, remTiles);
  params.tt = new Map();

  if (Math.random() < params.randomness) {
    const r = pickReasonable(ai, hum, params);
    if (r && r.move) return r;
  }

  const scored = [];

  const moves = allMoves.slice().sort((a, b) => {
    const aScore = getKingMoves(a, game.removed, hum).length + bfsReachCount(a, game.removed, hum) * 0.1;
    const bScore = getKingMoves(b, game.removed, hum).length + bfsReachCount(b, game.removed, hum) * 0.1;
    return bScore - aScore;
  });

  for (const mv of moves) {
    const sR = ai.r, sC = ai.c;
    ai.r = mv.r; ai.c = mv.c;
    const rems = getRemovalCandidates(game.removed, ai, hum, params);

    for (const rm of rems) {
      game.removed[rm.r][rm.c] = true;
      const immediateWin = getKingMoves(hum, game.removed, ai).length === 0;
      const v = immediateWin
        ? 200000
        : minimax(game.removed, ai, hum, false, params.depth - 1, -Infinity, Infinity, params);
      game.removed[rm.r][rm.c] = false;

      scored.push({ val: v, move: { r: mv.r, c: mv.c }, remove: { r: rm.r, c: rm.c } });
      if (difficulty === 'hard' && immediateWin) {
        ai.r = sR; ai.c = sC;
        return { move: { r: mv.r, c: mv.c }, remove: { r: rm.r, c: rm.c } };
      }
    }
    ai.r = sR; ai.c = sC;
  }

  const chosen = chooseWithSlop(scored, params.slop);
  if (chosen) return { move: chosen.move, remove: chosen.remove };

  const fallbackMove = allMoves[Math.floor(Math.random() * allMoves.length)];
  let fallbackRemove = null;
  for (let r = 0; r < ROWS && !fallbackRemove; r++) {
    for (let c = 0; c < COLS && !fallbackRemove; c++) {
      if (!game.removed[r][c] && !isStart(r, c) &&
          !(r === fallbackMove.r && c === fallbackMove.c) &&
          !(r === game.p1.r && c === game.p1.c)) fallbackRemove = { r, c };
    }
  }
  return { move: fallbackMove, remove: fallbackRemove };
}

/* =========================================================
   RENDERING & INPUT
   ========================================================= */

const boardEl = document.getElementById('board');
const boardFrameEl = document.getElementById('board-frame');
const phaseEl = document.getElementById('phase-text');

let tileEls = [];      // [r][c]
let pawnEls = { p1: null, p2: null };

function buildBoard() {
  boardEl.innerHTML = '';
  tileEls = [];
  for (let r = 0; r < ROWS; r++) {
    tileEls[r] = [];
    for (let c = 0; c < COLS; c++) {
      const t = document.createElement('div');
      t.className = 'tile';
      t.dataset.r = r;
      t.dataset.c = c;
      if (isStart(r, c)) t.classList.add('start');
      boardEl.appendChild(t);
      tileEls[r][c] = t;
    }
  }
  // Create pawns once, then move them between tiles
  const p1 = document.createElement('div');
  p1.className = 'pawn p1';
  p1.dataset.player = '1';
  attachPawnHandlers(p1);
  pawnEls.p1 = p1;

  const p2 = document.createElement('div');
  p2.className = 'pawn p2';
  p2.dataset.player = '2';
  attachPawnHandlers(p2);
  pawnEls.p2 = p2;
}

function render() {
  // Update tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = tileEls[r][c];
      t.classList.toggle('removed', game.removed[r][c]);
      t.classList.remove('can-move', 'can-remove');
    }
  }

  // Place pawns
  const tP1 = tileEls[game.p1.r][game.p1.c];
  if (pawnEls.p1.parentElement !== tP1) tP1.appendChild(pawnEls.p1);
  const tP2 = tileEls[game.p2.r][game.p2.c];
  if (pawnEls.p2.parentElement !== tP2) tP2.appendChild(pawnEls.p2);

  pawnEls.p1.classList.toggle('active', !game.over && game.current === 1 && game.phase === 'move');
  pawnEls.p2.classList.toggle('active', !game.over && game.current === 2 && game.phase === 'move');

  // Highlight legal targets
  if (!game.over && !aiThinking) {
    if (game.phase === 'move') {
      const meAI = (mode === 'cpu' && game.current === 2);
      if (!meAI) {
        const myPos = game.current === 1 ? game.p1 : game.p2;
        const other = game.current === 1 ? game.p2 : game.p1;
        const moves = getKingMoves(myPos, game.removed, other);
        moves.forEach(m => tileEls[m.r][m.c].classList.add('can-move'));
      }
    } else if (game.phase === 'remove') {
      const meAI = (mode === 'cpu' && game.current === 2);
      if (!meAI) {
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            if (game.removed[r][c]) continue;
            if (isStart(r, c)) continue;
            if (r === game.p1.r && c === game.p1.c) continue;
            if (r === game.p2.r && c === game.p2.c) continue;
            tileEls[r][c].classList.add('can-remove');
          }
        }
      }
    }
  }

  // Auto-rotate logic:
  //  - CPU mode: human is P1, always show P1 at bottom (board rotated 180), no toggle.
  //  - 2P mode + toggle OFF (default): P1 at bottom always (rotated 180).
  //  - 2P mode + toggle ON: rotate so current player's start is at bottom.
  let shouldRotate;
  if (mode === 'cpu') {
    shouldRotate = true;
  } else if (autoRotate) {
    shouldRotate = (game.current === 1);
  } else {
    shouldRotate = true; // P1 at bottom by default
  }
  if (game.over) shouldRotate = boardFrameEl.classList.contains('rotated');
  boardFrameEl.classList.toggle('rotated', shouldRotate);

  // Phase text
  updatePhaseText();
  updateScoreActive();
}

function updatePhaseText() {
  if (game.over) {
    phaseEl.className = 'phase';
    phaseEl.textContent = 'Game Over';
    return;
  }
  if (aiThinking) {
    phaseEl.className = 'phase thinking';
    phaseEl.textContent = p2Name + ' is thinking…';
    return;
  }
  const name = game.current === 1 ? p1Name : p2Name;
  const cls = 'phase p' + game.current;
  phaseEl.className = cls;
  const action = game.phase === 'move' ? 'Move your piece' : 'Remove a square';
  phaseEl.innerHTML = `<span class="pname">${escapeHtml(name)}'s Turn</span><span class="sep">—</span><span class="action">${action}</span>`;
}

function updateScoreActive() {
  document.getElementById('score-p1').classList.toggle('active', !game.over && game.current === 1);
  document.getElementById('score-p2').classList.toggle('active', !game.over && game.current === 2);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ---------- Tile click handler ---------- */
boardEl.addEventListener('click', (e) => {
  if (game.over || aiThinking) return;
  const t = e.target.closest('.tile');
  if (!t) return;
  const r = +t.dataset.r, c = +t.dataset.c;
  handleTileTap(r, c);
});

function handleTileTap(r, c) {
  if (game.phase === 'move') {
    if (mode === 'cpu' && game.current === 2) return;
    const myPos = game.current === 1 ? game.p1 : game.p2;
    const other = game.current === 1 ? game.p2 : game.p1;
    const legal = getKingMoves(myPos, game.removed, other).some(m => m.r === r && m.c === c);
    if (legal) doMove(r, c);
  } else if (game.phase === 'remove') {
    if (mode === 'cpu' && game.current === 2) return;
    if (game.removed[r][c]) return;
    if (isStart(r, c)) return;
    if (r === game.p1.r && c === game.p1.c) return;
    if (r === game.p2.r && c === game.p2.c) return;
    doRemove(r, c);
  }
}

function doMove(r, c) {
  const me = game.current === 1 ? game.p1 : game.p2;
  me.r = r; me.c = c;
  game.phase = 'remove';
  render();
}

function doRemove(r, c) {
  game.removed[r][c] = true;
  game.current = opponentOf(game.current);
  game.phase = 'move';
  render();
  // Check terminal
  if (checkLossForCurrent()) return;
  // AI turn
  if (mode === 'cpu' && game.current === 2 && !game.over) {
    triggerAITurn();
  }
}

function checkLossForCurrent() {
  const myPos = game.current === 1 ? game.p1 : game.p2;
  const other = game.current === 1 ? game.p2 : game.p1;
  const moves = getKingMoves(myPos, game.removed, other);
  if (moves.length === 0) {
    const winner = opponentOf(game.current);
    endGame(winner);
    return true;
  }
  return false;
}

function triggerAITurn() {
  aiThinking = true;
  render();
  const thinkDelay = difficulty === 'hard' ? 520 : (difficulty === 'medium' ? 340 : 180);
  setTimeout(() => {
    let decision = aiChooseTurn();
    aiThinking = false;
    if (!decision || !decision.move) {
      // Sanity check: don't declare loss unless AI truly has zero legal moves
      const verify = getKingMoves(game.p2, game.removed, game.p1);
      if (verify.length === 0) {
        endGame(1);
        return;
      }
      // Decision logic glitched but moves exist — play a safe random fallback
      const mv = verify[Math.floor(Math.random() * verify.length)];
      let rm = null;
      for (let r = 0; r < ROWS && !rm; r++) {
        for (let c = 0; c < COLS && !rm; c++) {
          if (!game.removed[r][c] && !isStart(r, c) &&
              !(r === mv.r && c === mv.c) &&
              !(r === game.p1.r && c === game.p1.c)) rm = { r, c };
        }
      }
      decision = { move: mv, remove: rm };
    }
    // animate move
    game.p2.r = decision.move.r;
    game.p2.c = decision.move.c;
    game.phase = 'remove';
    render();
    setTimeout(() => {
      if (decision.remove) game.removed[decision.remove.r][decision.remove.c] = true;
      game.current = 1;
      game.phase = 'move';
      render();
      checkLossForCurrent();
    }, 520);
  }, thinkDelay);
}

/* ---------- Drag and drop on pawns ----------
   Uses a "ghost" element appended to <body> during drag, so it can
   follow the pointer freely in viewport coords regardless of the
   board's rotation. The real pawn stays at its tile (semi-hidden).
*/
function attachPawnHandlers(pawn) {
  let dragging = false;
  let pointerId = null;
  let ghost = null;
  let offsetX = 0, offsetY = 0;
  let originRect = null;

  function isMyTurn() {
    if (game.over || aiThinking) return false;
    if (game.phase !== 'move') return false;
    const p = +pawn.dataset.player;
    if (p !== game.current) return false;
    if (mode === 'cpu' && p === 2) return false;
    return true;
  }

  function makeGhost(rect) {
    const g = document.createElement('div');
    g.className = 'pawn ' + (pawn.classList.contains('p1') ? 'p1' : 'p2') + ' dragging';
    g.style.position = 'fixed';
    g.style.left = rect.left + 'px';
    g.style.top  = rect.top  + 'px';
    g.style.width  = rect.width  + 'px';
    g.style.height = rect.height + 'px';
    g.style.zIndex = '9999';
    g.style.pointerEvents = 'none';
    g.style.transform = 'scale(1.12)';
    document.body.appendChild(g);
    return g;
  }

  pawn.addEventListener('pointerdown', (e) => {
    if (!isMyTurn()) return;
    e.preventDefault();
    pointerId = e.pointerId;
    try { pawn.setPointerCapture(pointerId); } catch (_) {}
    dragging = true;
    originRect = pawn.getBoundingClientRect();
    offsetX = e.clientX - originRect.left;
    offsetY = e.clientY - originRect.top;
    pawn.style.opacity = '0.25';
    ghost = makeGhost(originRect);
  });

  pawn.addEventListener('pointermove', (e) => {
    if (!dragging || !ghost) return;
    ghost.style.left = (e.clientX - offsetX) + 'px';
    ghost.style.top  = (e.clientY - offsetY) + 'px';
  });

  function finishDrag(e) {
    if (!dragging) return;
    dragging = false;
    try { pawn.releasePointerCapture(pointerId); } catch (_) {}
    if (ghost) { ghost.remove(); ghost = null; }
    pawn.style.opacity = '';
    // Hit-test for drop target
    const el = document.elementFromPoint(e.clientX, e.clientY);
    if (!el) return;
    const t = el.closest('.tile');
    if (!t) return;
    const r = +t.dataset.r, c = +t.dataset.c;
    handleTileTap(r, c);
  }

  pawn.addEventListener('pointerup', finishDrag);
  function cancelDrag() {
    if (!dragging) return;
    dragging = false;
    if (ghost) { ghost.remove(); ghost = null; }
    pawn.style.opacity = '';
  }

  pawn.addEventListener('pointercancel', cancelDrag);
  pawn.addEventListener('lostpointercapture', cancelDrag);
}

/* =========================================================
   FLOW: Menu / New Game / End
   ========================================================= */
function startGame() {
  const defaultP1 = mode === 'cpu' ? 'human' : 'Player 1';
  p1Name = (document.getElementById('p1-input').value || defaultP1).trim() || defaultP1;
  const botLabel = difficulty + 'Bot';
  p2Name = mode === 'cpu' ? botLabel : ((document.getElementById('p2-input').value || 'Player 2').trim() || 'Player 2');
  document.getElementById('s1-name').textContent = p1Name;
  document.getElementById('s2-name').textContent = p2Name;
  scores = { p1: 0, p2: 0 };
  document.getElementById('s1-wins').textContent = '0';
  document.getElementById('s2-wins').textContent = '0';
  // Reset auto-rotate state per mode (CPU mode hides the toggle entirely)
  autoRotate = false;
  document.getElementById('rotate-switch').classList.remove('on');
  document.getElementById('rotate-toggle-row').style.display = (mode === 'cpu') ? 'none' : 'flex';
  document.getElementById('menu-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  game = newGameState();
  buildBoard();
  render();
  startTimer();
}

function resetCurrentGame() {
  game = newGameState();
  aiThinking = false;
  document.getElementById('new-game-btn').classList.remove('pulsing');
  hideModal();
  render();
}

function goToMenu() {
  hideModal();
  stopTimer();
  document.getElementById('new-game-btn').classList.remove('pulsing');
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('menu-screen').classList.add('active');
}

function endGame(winner) {
  game.over = true;
  stopTimer();
  if (winner === 1) scores.p1++; else scores.p2++;
  document.getElementById('s1-wins').textContent = scores.p1;
  document.getElementById('s2-wins').textContent = scores.p2;
  document.getElementById('new-game-btn').classList.add('pulsing');
  render();
  const name = winner === 1 ? p1Name : p2Name;
  const loser = winner === 1 ? p2Name : p1Name;
  document.getElementById('winner-name').textContent = name;
  document.getElementById('win-reason').textContent = `${loser} has no legal moves left.`;
  document.getElementById('modal-inner').classList.toggle('p2win', winner === 2);
  showModal();
  burstConfetti(winner);
}

/* =========================================================
   TIMER
   ========================================================= */
function startTimer() {
  totalSeconds = 0;
  document.getElementById('timer').textContent = '00:00';
  if (timerInt) clearInterval(timerInt);
  timerInt = setInterval(() => {
    totalSeconds++;
    const mm = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
    const ss = String(totalSeconds % 60).padStart(2, '0');
    document.getElementById('timer').textContent = `${mm}:${ss}`;
  }, 1000);
}
function stopTimer() {
  if (timerInt) { clearInterval(timerInt); timerInt = null; }
}

/* =========================================================
   MODAL & CONFETTI
   ========================================================= */
function showModal() {
  const overlay = document.getElementById('win-modal');
  overlay.classList.remove('faded');
  overlay.classList.add('active');
  // After the splash, fade backdrop and shrink modal to reveal the board behind
  if (window._fadeModalTimeout) clearTimeout(window._fadeModalTimeout);
  window._fadeModalTimeout = setTimeout(() => {
    overlay.classList.add('faded');
  }, 3000);
}
function hideModal() {
  if (window._fadeModalTimeout) { clearTimeout(window._fadeModalTimeout); window._fadeModalTimeout = null; }
  const overlay = document.getElementById('win-modal');
  overlay.classList.remove('active');
  overlay.classList.remove('faded');
  stopConfetti();
}

let confettiRAF = null;
function burstConfetti(winner) {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  const W = canvas.width = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const palette = winner === 1
    ? ['#3b82f6', '#60a5fa', '#818cf8', '#a78bfa', '#ffffff', '#fde047']
    : ['#ef4444', '#f87171', '#fb923c', '#f59e0b', '#ffffff', '#fde047'];

  const N = 220;
  const parts = [];
  for (let i = 0; i < N; i++) {
    parts.push({
      x: W / 2 + (Math.random() - 0.5) * 120,
      y: H / 2 + (Math.random() - 0.5) * 60,
      vx: (Math.random() - 0.5) * 18,
      vy: (Math.random() * -16) - 4,
      g: 0.45 + Math.random() * 0.2,
      size: 4 + Math.random() * 6,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.4,
      color: palette[Math.floor(Math.random() * palette.length)],
      shape: Math.random() < 0.5 ? 'rect' : 'circle',
      life: 1,
    });
  }

  function tick() {
    ctx.clearRect(0, 0, W, H);
    let alive = 0;
    for (const p of parts) {
      p.vy += p.g;
      p.vx *= 0.995;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      p.life -= 0.006;
      if (p.life > 0 && p.y < H + 50) alive++;
      if (p.life <= 0) continue;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    if (alive > 0) {
      confettiRAF = requestAnimationFrame(tick);
    } else {
      ctx.clearRect(0, 0, W, H);
      confettiRAF = null;
    }
  }
  if (confettiRAF) cancelAnimationFrame(confettiRAF);
  tick();
}
function stopConfetti() {
  if (confettiRAF) cancelAnimationFrame(confettiRAF);
  confettiRAF = null;
  const canvas = document.getElementById('confetti');
  if (canvas.getContext) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

window.addEventListener('resize', () => {
  const canvas = document.getElementById('confetti');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

/* =========================================================
   MENU WIRING
   ========================================================= */
document.getElementById('mode-seg').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  document.querySelectorAll('#mode-seg button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  mode = b.dataset.mode;
  document.getElementById('diff-field').style.display = mode === 'cpu' ? 'block' : 'none';
  document.getElementById('p2-field').style.display = mode === 'cpu' ? 'none' : 'block';
  // Adjust the P1 label + default for context
  const p1Label = document.getElementById('p1-label');
  const p1Input = document.getElementById('p1-input');
  if (mode === 'cpu') {
    p1Label.textContent = 'Player Name';
    if (p1Input.value === 'Player 1' || p1Input.value.trim() === '') p1Input.value = 'human';
  } else {
    p1Label.textContent = 'Player 1 Name';
    if (p1Input.value === 'human' || p1Input.value.trim() === '') p1Input.value = 'Player 1';
  }
});

document.getElementById('diff-seg').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  document.querySelectorAll('#diff-seg button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  difficulty = b.dataset.diff;
});

document.getElementById('start-btn').addEventListener('click', startGame);

document.getElementById('rotate-switch').addEventListener('click', () => {
  autoRotate = !autoRotate;
  document.getElementById('rotate-switch').classList.toggle('on', autoRotate);
  render();
});

document.getElementById('new-game-btn').addEventListener('click', () => {
  resetCurrentGame();
  startTimer();
});
document.getElementById('menu-btn').addEventListener('click', goToMenu);

// Prevent context menu on long-press for mobile
document.addEventListener('contextmenu', (e) => {
  if (e.target.closest('.board')) e.preventDefault();
});

</script>
