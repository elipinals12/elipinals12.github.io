<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --accent: #7c5cfc; --accent2: #fc5c7d; --green: #5cfca0;
    --text: #e8e8f0; --muted: #888;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(124,92,252,.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(252,92,125,.06) 0%, transparent 60%);
  }
  .wrap { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 2rem 1.2rem 4rem; }
  header { text-align: center; margin-bottom: 2rem; }
  header h1 { font-size: clamp(1.6rem,5vw,2.4rem); font-weight: 800; letter-spacing: -.03em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header p { color: var(--muted); margin-top: .4rem; font-size: .9rem; }

  .hotline { background: rgba(252,92,125,.1); border: 1px solid rgba(252,92,125,.3); border-radius: 12px;
    padding: .8rem 1.2rem; margin-bottom: 1.5rem; font-size: .85rem; color: #fc5c7d; text-align: center; }
  .hotline strong { font-size: 1rem; }

  .search-wrap { position: relative; margin-bottom: 1rem; }
  .search-wrap input {
    width: 100%; padding: .85rem 1.2rem .85rem 3rem;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-size: .95rem; outline: none; transition: border .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .si { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); }

  .pills { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.2rem; }
  .pill { padding: .35rem .85rem; border-radius: 999px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); cursor: pointer; font-size: .8rem; transition: all .18s; }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .count { color: var(--muted); font-size: .78rem; margin-bottom: .8rem; }
  .results { display: flex; flex-direction: column; gap: .8rem; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 1rem 1.2rem; cursor: pointer; transition: all .18s; animation: fadeUp .3s ease both; }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .ctop { display: flex; gap: .9rem; align-items: flex-start; }
  .cicon { font-size: 1.6rem; flex-shrink: 0; }
  .ctitle { font-weight: 700; font-size: .95rem; margin-bottom: .15rem; }
  .csub { color: var(--muted); font-size: .8rem; line-height: 1.5; }
  .ctags { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .6rem; }
  .tag { padding: .15rem .55rem; background: rgba(124,92,252,.12); border-radius: 999px; font-size: .72rem; color: var(--accent); }
  .cbody { display: none; margin-top: .9rem; padding-top: .9rem; border-top: 1px solid var(--border);
    font-size: .84rem; line-height: 1.75; color: #ccc; }
  .cbody.open { display: block; animation: fadeDown .2s ease; }
  .cbody a { color: #a78bfa; text-decoration: none; }
  .cbody a:hover { text-decoration: underline; }

  /* job grid */
  .job-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: .6rem; margin-top: .8rem; }
  .job-card { background: rgba(124,92,252,.07); border: 1px solid rgba(124,92,252,.2); border-radius: 10px;
    padding: .7rem .9rem; text-decoration: none; transition: all .18s; display: block; }
  .job-card:hover { background: rgba(124,92,252,.18); border-color: var(--accent); transform: translateY(-1px); }
  .job-card .jc-role { font-size: .78rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem; }
  .job-card .jc-org { font-size: .88rem; font-weight: 600; color: var(--text); }
  .job-card .jc-note { font-size: .75rem; color: var(--muted); margin-top: .2rem; }
  .section-label { font-size: .78rem; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: .06em; margin: 1rem 0 .4rem; }

  .links { margin-top: .8rem; display: flex; flex-wrap: wrap; gap: .5rem; }
  .lnk { padding: .3rem .8rem; border-radius: 8px; font-size: .76rem; font-weight: 600;
    text-decoration: none; background: rgba(124,92,252,.15); color: var(--accent);
    border: 1px solid rgba(124,92,252,.25); transition: all .18s; }
  .lnk:hover { background: var(--accent); color: #fff; }

  .empty { text-align: center; color: var(--muted); padding: 3rem 0; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:none; } }
</style>

const cats = ["All", ...new Set(data.flatMap(d => d.cats))];
let active = "All", open = null;

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const f = data.filter(d => {
    const mc = active === "All" || d.cats.includes(active);
    const mq = !q || d.title.toLowerCase().includes(q) || d.sub.toLowerCase().includes(q) || d.tags.some(t => t.includes(q)) || d.body.toLowerCase().includes(q);
    return mc && mq;
  });
  document.getElementById('count').textContent = `${f.length} resource${f.length!==1?'s':''} found`;
  const res = document.getElementById('results');
  if (!f.length) { res.innerHTML = '<div class="empty">🔭 No results — try a different search or category.</div>'; return; }
  res.innerHTML = f.map((d,i) => `
    <div class="card" onclick="tog(${i})" style="animation-delay:${i*.03}s">
      <div class="ctop">
        <div class="cicon">${d.icon}</div>
        <div>
          <div class="ctitle">${d.title}</div>
          <div class="csub">${d.sub}</div>
          <div class="ctags">${d.tags.slice(0,5).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>
      <div class="cbody ${open===i?'open':''}">${d.body}
        ${d.links.length ? `<div class="links">${d.links.map(l=>`<a class="lnk" href="${l[1]}" target="_blank" onclick="event.stopPropagation()">${l[0]}</a>`).join('')}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function tog(i) { open = open===i ? null : i; render(); }

const pw = document.getElementById('pills');
cats.forEach(c => {
  const el = document.createElement('div');
  el.className = 'pill'+(c==='All'?' active':'');
  el.textContent = c;
  el.onclick = () => {
    active = c; open = null;
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    el.classList.add('active');
    render();
  };
  pw.appendChild(el);
});

render();
</script>
