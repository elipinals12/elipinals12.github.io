<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Counters</title>
<link rel="icon" href="../../ref/Disc_Plain_blue_dark.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#e8e8e8}
button{font-family:inherit}

.app{display:flex;flex-direction:column;height:100%;height:100dvh}
.topbar{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;flex-shrink:0;flex-wrap:wrap}
.topbar button{background:#1e1e1e;border:1px solid #2a2a2a;color:#aaa;padding:8px 16px;border-radius:10px;cursor:pointer;font-size:.82rem;transition:.2s;white-space:nowrap}
.topbar button:hover{background:#252525;border-color:#444}
.topbar button.active{background:#252525;border-color:#555;color:#fff}
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px}

/* Grid */
.grid{display:flex;flex-wrap:wrap;justify-content:center;align-content:start;gap:16px;width:100%;max-width:1200px;margin:0 auto}
.card{background:#1a1a1a;border-radius:16px;padding:24px 16px;text-align:center;border:2px solid transparent;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px}
.card .sparkle{position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,.12) 0%,transparent 70%);opacity:0;transition:opacity .4s;pointer-events:none}
.card.flash .sparkle{opacity:1;transition:opacity 0s}
.detail .splash{position:absolute;inset:0;opacity:0;transition:opacity .5s;pointer-events:none;border-radius:24px}
.detail.flash .splash{opacity:1;transition:opacity 0s}
.card .name-edit{font-size:1rem;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;opacity:.7;background:none;border:none;color:inherit;text-align:center;width:100%;cursor:text;outline:none;padding:2px 4px;border-radius:4px;font-family:inherit}
.card .name-edit:focus{background:#222;opacity:1}
.card .count{font-size:3.2rem;font-weight:800;margin-bottom:16px;pointer-events:none}
.card .btns{display:flex;gap:8px;justify-content:center}
.card .btns button{width:54px;height:46px;border-radius:10px;border:none;font-size:1.3rem;font-weight:700;cursor:pointer;transition:.15s;color:#fff}
.card .btns button:active{transform:scale(.93)}

.grid .card{width:calc(50% - 8px);max-width:340px}
@media(min-width:700px){.grid .card{width:calc(33.333% - 11px)}}
@media(min-width:1000px){.grid .card{width:calc(25% - 12px)}}
.grid[data-count="1"] .card{width:min(90vw,500px);min-height:260px}
.grid[data-count="1"] .card .count{font-size:5rem}
.grid[data-count="2"] .card{width:min(45vw,400px);min-height:220px}
.grid[data-count="2"] .card .count{font-size:4rem}

/* Detail */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:10;justify-content:center;align-items:center;padding:20px}
.overlay.open{display:flex}
.detail{background:#1a1a1a;border-radius:24px;padding:40px 30px 36px;text-align:center;width:min(92vw,420px);position:relative}
.detail .back{position:absolute;top:16px;left:20px;background:none;border:none;color:#666;font-size:1.6rem;cursor:pointer;transition:.2s;line-height:1}
.detail .back:hover{color:#fff}
.detail .del{position:absolute;top:18px;right:20px;background:none;border:none;color:#444;font-size:.75rem;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:.2s}
.detail .del:hover{color:#f66}
.detail .name-edit{font-size:1rem;text-transform:uppercase;letter-spacing:2px;opacity:.6;margin-top:10px;background:none;border:none;color:inherit;text-align:center;width:100%;cursor:text;outline:none;padding:4px;border-radius:4px;font-family:inherit}
.detail .name-edit:focus{background:#222;opacity:1}
.detail .count{font-size:6.5rem;font-weight:900;margin:12px 0 28px;line-height:1}
.detail .row{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.detail .row button{flex:1;max-width:90px;height:52px;border-radius:12px;border:none;font-size:1.15rem;font-weight:700;cursor:pointer;color:#fff;transition:.15s}
.detail .row button:active{transform:scale(.93)}
.detail .reset{margin-top:20px;background:none;border:1px solid #2a2a2a;color:#666;padding:8px 24px;border-radius:10px;cursor:pointer;font-size:.78rem;text-transform:uppercase;letter-spacing:1px;transition:.2s}
.detail .reset:hover{border-color:#555;color:#bbb}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:20;justify-content:center;align-items:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#1a1a1a;border-radius:18px;padding:30px;width:min(92vw,360px)}
.modal label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:1px;opacity:.5;margin-bottom:6px}
.modal input[type=text]{width:100%;background:#111;border:1px solid #2a2a2a;color:#e8e8e8;padding:12px 14px;border-radius:10px;font-size:1rem;margin-bottom:18px;outline:none;font-family:inherit}
.modal input[type=text]:focus{border-color:#555}
.modal .actions{display:flex;gap:8px;margin-top:20px}
.modal .actions button{flex:1;padding:12px;border-radius:10px;border:none;font-size:.95rem;cursor:pointer;font-weight:600;transition:.15s}
.modal .cancel{background:#222;color:#999}
.modal .cancel:hover{background:#2a2a2a}
.modal .create{color:#fff}
.modal .create:hover{opacity:.9}

/* 2D Color Picker */
.cpicker{position:relative;width:100%;height:140px;border-radius:10px;cursor:crosshair;margin-bottom:8px;overflow:hidden;touch-action:none}
.cpicker canvas{width:100%;height:100%;display:block;border-radius:10px}
.cpicker .thumb{position:absolute;width:18px;height:18px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 0 4px rgba(0,0,0,.5);pointer-events:none;transform:translate(-50%,-50%);transition:left .05s,top .05s}
.cpreview{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.cpreview .swatch{width:36px;height:36px;border-radius:50%;border:2px solid #333;flex-shrink:0}
.cpreview .hex{font-size:.8rem;opacity:.5;font-family:monospace}
.cslider{width:100%;appearance:none;-webkit-appearance:none;height:14px;border-radius:7px;outline:none;cursor:pointer;margin-bottom:2px}
.cslider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid #333;cursor:pointer}
.cslider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid #333;cursor:pointer}
.cslider-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.35;margin-bottom:4px}

/* Chart */
.chart-page{display:flex;flex-direction:column;align-items:center;justify-content:start;height:100%;padding-top:10px}
.chart-wrap{position:relative;width:min(80vw,360px);height:min(80vw,360px);margin:0 auto 20px}
.chart-wrap svg{width:100%;height:100%}
.chart-legend{display:flex;flex-wrap:wrap;justify-content:center;gap:12px 20px;max-width:500px}
.chart-legend .item{display:flex;align-items:center;gap:8px;font-size:.95rem}
.chart-legend .dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.chart-empty{opacity:.25;margin-top:60px;font-size:.95rem;text-align:center}

/* Ranking */
.ranking-page{max-width:500px;margin:0 auto;width:100%}
.rank-item{display:flex;align-items:center;gap:14px;background:#1a1a1a;border-radius:14px;padding:16px 20px;margin-bottom:10px}
.rank-pos{font-size:1.4rem;font-weight:800;opacity:.3;width:30px;text-align:center;flex-shrink:0}
.rank-bar-wrap{flex:1;min-width:0}
.rank-name{font-size:.85rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;opacity:.7}
.rank-bar{height:12px;border-radius:6px;transition:width .4s;min-width:4px}
.rank-val{font-size:1.4rem;font-weight:700;flex-shrink:0;min-width:40px;text-align:right}

/* Manage */
.manage-page{max-width:500px;margin:0 auto;width:100%}
.manage-item{display:flex;align-items:center;gap:12px;background:#1a1a1a;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.manage-swatch{width:28px;height:28px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:.15s;border:2px solid transparent}
.manage-swatch:hover{border-color:#fff}
.manage-name{flex:1;background:none;border:none;color:#e8e8e8;font-size:1rem;outline:none;padding:4px 8px;border-radius:6px;font-family:inherit;min-width:0}
.manage-name:focus{background:#222}
.manage-val{font-size:1.1rem;font-weight:700;min-width:50px;text-align:right;margin-right:4px;background:none;border:none;color:inherit;outline:none;padding:4px 8px;border-radius:6px;font-family:inherit;-moz-appearance:textfield}
.manage-val:focus{background:#222}
.manage-val::-webkit-inner-spin-button,.manage-val::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.manage-del{background:none;border:none;color:#444;font-size:1.2rem;cursor:pointer;padding:4px 8px;transition:.2s}
.manage-del:hover{color:#f66}

.empty-msg{text-align:center;opacity:.2;margin-top:60px;font-size:.95rem}

/* Color pop (manage page) */
.color-pop{position:fixed;z-index:30;background:#1e1e1e;border-radius:14px;padding:14px;box-shadow:0 8px 30px rgba(0,0,0,.6);touch-action:none;width:220px}
.color-pop .cp-canvas-wrap{position:relative;width:100%;height:110px;border-radius:8px;cursor:crosshair;overflow:hidden;margin-bottom:8px;touch-action:none}
.color-pop canvas{width:100%;height:100%;display:block;border-radius:8px}
.color-pop .thumb{position:absolute;width:16px;height:16px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 0 4px rgba(0,0,0,.5);pointer-events:none;transform:translate(-50%,-50%)}
.color-pop .cp-light{width:100%;appearance:none;-webkit-appearance:none;height:12px;border-radius:6px;outline:none;cursor:pointer}
.color-pop .cp-light::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #333;cursor:pointer}
.color-pop .cp-light::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #333;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button onclick="openModal()">+ New</button>
    <button class="active" data-page="overview" onclick="switchPage('overview')">Overview</button>
    <button data-page="chart" onclick="switchPage('chart')">Pie</button>
    <button data-page="ranking" onclick="switchPage('ranking')">Ranking</button>
    <button data-page="manage" onclick="switchPage('manage')">Manage</button>
  </div>
  <div class="page" id="pageContent"></div>
</div>

<!-- Detail -->
<div class="overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail" id="detailCard">
    <div class="splash" id="detailSplash"></div>
    <button class="back" onclick="closeDetail()">←</button>
    <button class="del" onclick="deleteCurrent()">delete</button>
    <input class="name-edit" id="detailName" maxlength="24" onchange="renameDetail(this.value)">
    <div class="count" id="detailCount"></div>
    <div class="row">
      <button class="pos" onclick="adjFlash(1,this)">+1</button>
      <button class="pos" onclick="adjFlash(2,this)">+2</button>
      <button class="pos" onclick="adjFlash(3,this)">+3</button>
      <button class="pos" onclick="adjFlash(5,this)">+5</button>
      <button class="pos" onclick="adjFlash(10,this)">+10</button>
    </div>
    <div class="row">
      <button class="neg" onclick="adjFlash(-1,this)">−1</button>
      <button class="neg" onclick="adjFlash(-2,this)">−2</button>
      <button class="neg" onclick="adjFlash(-3,this)">−3</button>
      <button class="neg" onclick="adjFlash(-5,this)">−5</button>
      <button class="neg" onclick="adjFlash(-10,this)">−10</button>
    </div>
    <button class="reset" onclick="resetCurrent()">Reset to 0</button>
  </div>
</div>

<!-- New Counter Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <label>Name</label>
    <input type="text" id="nameInput" placeholder="e.g. Push-ups" maxlength="24" onkeydown="if(event.key==='Enter')createCounter()">
    <label>Color</label>
    <div class="cpicker" id="modalPicker">
      <canvas></canvas>
      <div class="thumb"></div>
    </div>
    <div class="cslider-label">Brightness</div>
    <input type="range" class="cslider" id="modalLightness" min="30" max="75" value="60">
    <div class="cpreview">
      <div class="swatch" id="modalSwatch"></div>
      <div class="hex" id="modalHex"></div>
    </div>
    <div class="actions">
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="create" id="createBtn" onclick="createCounter()">Create</button>
    </div>
  </div>
</div>

<script>
/* --- State --- */
let counters=[{id:uid(),name:'Counter',value:0,color:'#6366f1'}];
let activeId=null, currentPage='overview';
let modalHue=250, modalSat=80, modalLight=60;
let colorPopEl=null, popTargetId=null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function find(id){return counters.find(c=>c.id===id)}
function hsl2hex(h,s,l){
  const c=(1-Math.abs(2*l/100-1))*(s/100), x=c*(1-Math.abs((h/60)%2-1)), m=l/100-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x}else if(h<120){r=x;g=c}else if(h<180){g=c;b=x}
  else if(h<240){g=x;b=c}else if(h<300){r=x;b=c}else{r=c;b=x}
  const toH=v=>Math.round((v+m)*255).toString(16).padStart(2,'0');
  return'#'+toH(r)+toH(g)+toH(b);
}

/* --- 2D Picker Logic --- */
function drawPickerCanvas(canvas,lightness){
  const ctx=canvas.getContext('2d');
  const w=canvas.width=canvas.offsetWidth*2;
  const h=canvas.height=canvas.offsetHeight*2;
  const img=ctx.createImageData(w,h);
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const hue=(x/w)*360;
      const sat=100-(y/h)*100;
      const hex=hsl2hex(hue,sat,lightness);
      const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
      const i=(y*w+x)*4;
      img.data[i]=r;img.data[i+1]=g;img.data[i+2]=b;img.data[i+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
}

function setupPicker(wrapEl,canvas,thumb,getLight,onPick){
  function pick(ex,ey){
    const r=wrapEl.getBoundingClientRect();
    const x=Math.max(0,Math.min(1,(ex-r.left)/r.width));
    const y=Math.max(0,Math.min(1,(ey-r.top)/r.height));
    const hue=x*360, sat=100-y*100;
    thumb.style.left=(x*100)+'%';
    thumb.style.top=(y*100)+'%';
    const hex=hsl2hex(hue,sat,getLight());
    thumb.style.background=hex;
    onPick(hue,sat,hex);
  }
  let down=false;
  wrapEl.addEventListener('pointerdown',e=>{down=true;wrapEl.setPointerCapture(e.pointerId);pick(e.clientX,e.clientY)});
  wrapEl.addEventListener('pointermove',e=>{if(down)pick(e.clientX,e.clientY)});
  wrapEl.addEventListener('pointerup',()=>down=false);
  wrapEl.addEventListener('pointercancel',()=>down=false);
  return{pick,redraw:()=>drawPickerCanvas(canvas,getLight())};
}

/* --- Modal Picker --- */
let modalPicker=null;
function initModalPicker(){
  const wrap=document.getElementById('modalPicker');
  const canvas=wrap.querySelector('canvas');
  const thumb=wrap.querySelector('.thumb');
  const slider=document.getElementById('modalLightness');
  const swatch=document.getElementById('modalSwatch');
  const hexEl=document.getElementById('modalHex');
  const btn=document.getElementById('createBtn');

  function getLight(){return+slider.value}
  function updatePreview(hex){
    swatch.style.background=hex;
    hexEl.textContent=hex;
    btn.style.background=hex;
    slider.style.background=`linear-gradient(to right,${hsl2hex(modalHue,modalSat,30)},${hsl2hex(modalHue,modalSat,75)})`;
  }

  modalPicker=setupPicker(wrap,canvas,thumb,getLight,(h,s,hex)=>{
    modalHue=h;modalSat=s;updatePreview(hex);
  });

  slider.oninput=()=>{
    modalLight=+slider.value;
    modalPicker.redraw();
    const hex=hsl2hex(modalHue,modalSat,modalLight);
    thumb.style.background=hex;
    updatePreview(hex);
  };

  modalPicker.redraw();
  thumb.style.left=(modalHue/360*100)+'%';
  thumb.style.top=((100-modalSat)/100*100)+'%';
  const initHex=hsl2hex(modalHue,modalSat,modalLight);
  thumb.style.background=initHex;
  updatePreview(initHex);
}

/* --- Pages --- */
function switchPage(p){
  currentPage=p;
  document.querySelectorAll('.topbar button[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===p));
  render();
}

function render(){
  const el=document.getElementById('pageContent');
  closeColorPop();
  if(currentPage==='overview') renderOverview(el);
  else if(currentPage==='chart') renderChart(el);
  else if(currentPage==='ranking') renderRanking(el);
  else if(currentPage==='manage') renderManage(el);
}

function renderOverview(el){
  if(!counters.length){el.innerHTML='<div class="empty-msg">No counters yet</div>';return}
  let h=`<div class="grid" data-count="${Math.min(counters.length,3)}">`;
  counters.forEach(c=>{
    h+=`<div class="card" style="border-color:${c.color}22" data-id="${c.id}">
      <div class="sparkle"></div>
      <input class="name-edit" style="color:${c.color}" value="${esc(c.name)}" maxlength="24"
        onclick="event.stopPropagation()" onfocus="event.stopPropagation()"
        onchange="renameCard('${c.id}',this.value)">
      <div class="count" style="color:${c.color}">${c.value}</div>
      <div class="btns">
        <button style="background:${c.color}30;color:${c.color}" data-id="${c.id}" data-d="-1">−</button>
        <button style="background:${c.color}50;color:${c.color}" data-id="${c.id}" data-d="1">+</button>
      </div>
    </div>`;
  });
  h+='</div>';
  el.innerHTML=h;
  el.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',e=>{
      if(e.target.tagName==='BUTTON'){
        const id=e.target.dataset.id,d=+e.target.dataset.d,ct=find(id);
        if(ct){ct.value+=d;flashCard(card,ct.color);render()}return;
      }
      if(e.target.tagName==='INPUT')return;
      openDetail(card.dataset.id);
    });
  });
}
function flashCard(card,color){
  const sp=card.querySelector('.sparkle');
  sp.style.background=`radial-gradient(circle,${color}20 0%,transparent 70%)`;
  card.classList.add('flash');
  requestAnimationFrame(()=>requestAnimationFrame(()=>card.classList.remove('flash')));
}
function renameCard(id,val){const c=find(id);if(c)c.name=val.trim()||'Counter'}

/* Detail */
function openDetail(id){activeId=id;renderDetail();document.getElementById('detailOverlay').classList.add('open')}
function closeDetail(){activeId=null;document.getElementById('detailOverlay').classList.remove('open');render()}
function renderDetail(){
  const c=find(activeId);if(!c)return closeDetail();
  const dn=document.getElementById('detailName');dn.value=c.name;dn.style.color=c.color;
  const dc=document.getElementById('detailCount');dc.textContent=c.value;dc.style.color=c.color;
  const card=document.getElementById('detailCard');card.style.borderTop=`3px solid ${c.color}`;
  card.querySelectorAll('.pos').forEach(b=>b.style.background=c.color+'40');
  card.querySelectorAll('.neg').forEach(b=>b.style.background=c.color+'20');
}
function renameDetail(val){const c=find(activeId);if(c)c.name=val.trim()||'Counter'}
function adj(d){const c=find(activeId);if(c){c.value+=d;renderDetail()}}
function adjFlash(d,btnEl){
  const c=find(activeId);if(!c)return;
  c.value+=d;renderDetail();
  const splash=document.getElementById('detailSplash');
  splash.style.background=`radial-gradient(circle,${c.color}18 0%,transparent 70%)`;
  const card=document.getElementById('detailCard');
  card.classList.add('flash');
  requestAnimationFrame(()=>requestAnimationFrame(()=>card.classList.remove('flash')));
}
function resetCurrent(){const c=find(activeId);if(c){c.value=0;renderDetail()}}
function deleteCurrent(){counters=counters.filter(c=>c.id!==activeId);closeDetail()}

/* Chart */
function renderChart(el){
  const valid=counters.filter(c=>c.value>0);
  if(!valid.length){el.innerHTML='<div class="chart-page"><div class="chart-empty">Need at least one counter above 0</div></div>';return}
  const total=valid.reduce((s,c)=>s+c.value,0);
  let cum=0;
  const slices=valid.map(c=>{const start=cum/total*360;const sweep=c.value/total*360;cum+=c.value;return{...c,start,sweep}});
  let svg='<svg viewBox="-1.1 -1.1 2.2 2.2" xmlns="http://www.w3.org/2000/svg">';
  if(slices.length===1){svg+=`<circle cx="0" cy="0" r="1" fill="${slices[0].color}"/>`}
  else{slices.forEach(s=>{
    const lg=s.sweep>180?1:0,sr=s.start*Math.PI/180-Math.PI/2,er=(s.start+s.sweep)*Math.PI/180-Math.PI/2;
    svg+=`<path d="M0 0 L${Math.cos(sr)} ${Math.sin(sr)} A1 1 0 ${lg} 1 ${Math.cos(er)} ${Math.sin(er)}Z" fill="${s.color}"/>`;
  })}
  svg+='</svg>';
  let legend='<div class="chart-legend">';
  valid.forEach(c=>{const pct=Math.round(c.value/total*100);legend+=`<div class="item"><div class="dot" style="background:${c.color}"></div>${esc(c.name)} · ${c.value} (${pct}%)</div>`});
  legend+='</div>';
  el.innerHTML=`<div class="chart-page"><div class="chart-wrap">${svg}</div>${legend}</div>`;
}

/* Ranking */
function renderRanking(el){
  if(!counters.length){el.innerHTML='<div class="empty-msg">No counters</div>';return}
  const sorted=[...counters].sort((a,b)=>b.value-a.value);
  const max=Math.max(...sorted.map(c=>Math.abs(c.value)),1);
  let h='<div class="ranking-page">';
  sorted.forEach((c,i)=>{
    const w=Math.max((Math.abs(c.value)/max)*100,2);
    h+=`<div class="rank-item"><div class="rank-pos">${i+1}</div><div class="rank-bar-wrap">
      <div class="rank-name" style="color:${c.color}">${esc(c.name)}</div>
      <div class="rank-bar" style="background:${c.color};width:${w}%"></div>
    </div><div class="rank-val" style="color:${c.color}">${c.value}</div></div>`;
  });
  h+='</div>';el.innerHTML=h;
}

/* Manage */
function renderManage(el){
  if(!counters.length){el.innerHTML='<div class="empty-msg">No counters</div>';return}
  let h='<div class="manage-page">';
  counters.forEach(c=>{
    h+=`<div class="manage-item" data-id="${c.id}">
      <div class="manage-swatch" style="background:${c.color}" data-id="${c.id}" onclick="openColorPop(event,'${c.id}')"></div>
      <input class="manage-name" value="${esc(c.name)}" maxlength="24" onchange="manageRename('${c.id}',this.value)">
      <div class="manage-val" style="color:${c.color}">${c.value}</div>
      <button class="manage-del" onclick="manageDelete('${c.id}')">×</button>
    </div>`;
  });
  h+='</div>';el.innerHTML=h;
}
function manageRename(id,val){const c=find(id);if(c)c.name=val.trim()||'Counter'}
function manageSetVal(id,val){const c=find(id);if(c)c.value=parseInt(val)||0}
function manageDelete(id){counters=counters.filter(c=>c.id!==id);render()}

/* Manage color pop with 2D picker */
function openColorPop(e,id){
  e.stopPropagation();closeColorPop();popTargetId=id;
  const rect=e.target.getBoundingClientRect();
  const pop=document.createElement('div');pop.className='color-pop';
  pop.style.top=Math.min(rect.bottom+6,window.innerHeight-200)+'px';
  pop.style.left=Math.min(rect.left,window.innerWidth-230)+'px';
  pop.innerHTML=`<div class="cp-canvas-wrap"><canvas></canvas><div class="thumb"></div></div>
    <input type="range" class="cp-light" min="30" max="75" value="55">`;
  pop.addEventListener('click',ev=>ev.stopPropagation());
  document.body.appendChild(pop);colorPopEl=pop;

  const wrap=pop.querySelector('.cp-canvas-wrap');
  const canvas=pop.querySelector('canvas');
  const thumb=pop.querySelector('.thumb');
  const slider=pop.querySelector('.cp-light');
  let pH=0,pS=80;

  const pp=setupPicker(wrap,canvas,thumb,()=>+slider.value,(h,s,hex)=>{
    pH=h;pS=s;const ct=find(popTargetId);if(ct){ct.color=hex;render();reopenPop()}
  });
  slider.oninput=()=>{pp.redraw();const hex=hsl2hex(pH,pS,+slider.value);thumb.style.background=hex;
    const ct=find(popTargetId);if(ct){ct.color=hex;render();reopenPop()}};
  pp.redraw();
  thumb.style.left='50%';thumb.style.top='10%';
  thumb.style.background=find(id)?.color||'#fff';

  function reopenPop(){
    /* keep pop alive after render */
    if(!document.body.contains(pop))document.body.appendChild(pop);
  }
}
function closeColorPop(){if(colorPopEl){colorPopEl.remove();colorPopEl=null;popTargetId=null}}
document.addEventListener('click',closeColorPop);

/* Modal */
function openModal(){
  modalHue=Math.random()*360;modalSat=70+Math.random()*30;modalLight=60;
  document.getElementById('nameInput').value='';
  document.getElementById('modalLightness').value=modalLight;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>{initModalPicker();document.getElementById('nameInput').focus()},60);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
function createCounter(){
  const name=document.getElementById('nameInput').value.trim()||'Counter';
  const color=hsl2hex(modalHue,modalSat,modalLight);
  counters.push({id:uid(),name,value:0,color});
  closeModal();switchPage('overview');
}

render();
</script>
