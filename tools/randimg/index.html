<html>
<head>
  <title>random image slideshow</title>
  <style>
    * { margin: 0; padding: 0; cursor: none; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    #setup { text-align: center; }
    #setup h1 { font-family: 'Segoe UI', sans-serif; font-size: 1.8rem; font-weight: 300; color: #7eb8da; margin-bottom: 40px; }
    #setup input {
      font-family: 'Segoe UI', sans-serif; font-size: 5rem; font-weight: 200;
      background: transparent; border: none; border-bottom: 2px solid #7eb8da33;
      color: #7eb8da; text-align: center; width: 4ch; outline: none; caret-color: #7eb8da;
    }
    #setup input::placeholder { color: #7eb8da44; }
    #setup label { display: block; margin-top: 14px; font-family: 'Segoe UI', sans-serif; font-size: 1rem; color: #7eb8da66; }
    #setup .hint { display: block; margin-top: 24px; font-family: 'Segoe UI', sans-serif; font-size: 0.7rem; color: #ffffff22; }
    #start {
      margin-top: 36px; padding: 16px 48px; font-family: 'Segoe UI', sans-serif; font-size: 1.4rem; font-weight: 300;
      background: transparent; border: 1px solid #7eb8da33; border-radius: 6px;
      color: #7eb8da; cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    #start:hover { border-color: #7eb8da88; color: #7eb8dacc; }
    #slide {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      object-fit: cover; border: none; outline: none;
    }
  </style>
</head>
<body>

<div id="setup">
  <h1>random image slideshow</h1>
  <input id="seconds" type="number" min="0.01" step="any" placeholder="10" autofocus>
  <label>seconds between images</label>
  <span class="hint">minimum 0.01s · esc to return</span>
  <br><br>
  <button id="start">start slideshow</button>
</div>
<img id="slide">

<script>
let W = innerWidth, H = innerHeight;
const ready = [];
let loading = 0;
let generation = 0;
let queueSize = 10;
let intervalId = null;

function preload() {
  while (loading + ready.length < queueSize) {
    loading++;
    const gen = generation;
    const img = new Image();
    img.onload = () => { if (gen === generation) ready.push(img.src); loading--; preload(); };
    img.onerror = () => { loading--; preload(); };
    img.src = `https://unsplash.it/${W}/${H}?random&t=${Date.now()}-${Math.random()}`;
  }
}

// start preloading immediately while user types
preload();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    W = innerWidth;
    H = innerHeight;
    generation++;
    ready.length = 0;
    loading = 0;
    preload();
  }, 300);
});

const slide = document.getElementById('slide');
const setup = document.getElementById('setup');
const input = document.getElementById('seconds');

function begin() {
  const sec = Math.max(0.01, parseFloat(input.value) || 10);
  queueSize = Math.min(200, Math.max(10, Math.ceil(20 / sec)));
  generation++;
  ready.length = 0;
  loading = 0;
  preload();
  startSlideshow(sec);
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') begin(); });
document.getElementById('start').addEventListener('click', begin);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && intervalId !== null) {
    clearInterval(intervalId);
    intervalId = null;
    slide.style.display = 'none';
    setup.style.display = '';
    input.focus();
    // reset buffer to default while picking
    queueSize = 10;
    generation++;
    ready.length = 0;
    loading = 0;
    preload();
  }
});

function waitForReady() {
  return new Promise(resolve => {
    if (ready.length > 0) return resolve();
    const check = setInterval(() => {
      if (ready.length > 0) { clearInterval(check); resolve(); }
    }, 5);
  });
}

async function startSlideshow(sec) {
  await waitForReady();

  slide.src = ready.shift();
  slide.style.display = 'block';
  setup.style.display = 'none';
  preload();

  intervalId = setInterval(() => {
    if (ready.length > 0) {
      slide.src = ready.shift();
      preload();
    }
  }, sec * 1000);
}
</script>
</body>
</html>
