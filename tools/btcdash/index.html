<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BTCdash</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23f7931a'/%3E%3Ctext x='50' y='74' font-size='72' text-anchor='middle' fill='%23000000' font-family='Arial,sans-serif' font-weight='bold'%3E%E2%82%BF%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000; --panel:#0a0908; --line:#191613; --line2:#2a241c;
    --ink:#f4efe7; --mute:#8a8174; --faint:#544e44;
    --btc:#f7931a;
    --c-sec:#f7931a; --c-health:#3fd0c9; --c-adopt:#ff8a00; --c-val:#8c8276; --c-macro:#b48ead;
    --pos:#5ec77a; --neg:#e5564b; --r:15px;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    --disp:"Space Grotesk",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1100px 600px at 100% -15%, rgba(247,147,26,.07), transparent 60%),var(--bg);
    color:var(--ink);font-family:var(--disp);-webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.3px}

  header{position:sticky;top:0;z-index:40;background:rgba(0,0,0,.78);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
  .hwrap{max-width:1520px;margin:0 auto;padding:13px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;margin-right:auto}
  .brand h1{margin:0}
  .wordmark{font-size:21px;font-weight:700;color:var(--btc);letter-spacing:1.5px;line-height:1}
  .stat-pill{display:flex;flex-direction:column;gap:1px;padding:5px 12px;border-left:1px solid var(--line)}
  .stat-pill .k{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:1.2px}
  .stat-pill .v{font-size:14px;font-weight:600}
  .legend{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
  .lg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.8px;
    background:none;border:1px solid var(--line);border-radius:20px;padding:4px 11px;cursor:pointer;font-family:var(--disp);transition:.15s}
  .lg:hover{border-color:var(--line2);color:var(--ink)}
  .lg.off{opacity:.4}.lg.off i{background:var(--faint)!important}
  .lg i{width:7px;height:7px;border-radius:50%;display:inline-block}
  .live{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:1px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--pos);animation:pp 2.4s infinite}
  .dot.warn{background:var(--btc)}.dot.err{background:var(--neg);animation:none}
  @keyframes pp{0%{box-shadow:0 0 0 0 rgba(94,199,122,.45)}70%{box-shadow:0 0 0 7px rgba(94,199,122,0)}100%{box-shadow:0 0 0 0 transparent}}

  main{max-width:1520px;margin:0 auto;padding:16px 20px 8px}
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
  .card{grid-column:span 4;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
    padding:14px 16px;position:relative;overflow:hidden;cursor:pointer;min-height:158px;
    display:flex;flex-direction:column;transition:border-color .18s,transform .15s}
  .card::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:2px;border-radius:2px;background:var(--cat)}
  .card:hover{border-color:var(--cat);transform:translateY(-2px)}
  .card.span6{grid-column:span 6}.card.span8{grid-column:span 8}.card.tall{min-height:300px}
  .card.sortable-ghost{opacity:.3}.card.sortable-chosen{border-color:var(--cat)}
  .chead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
  .ctitle{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--mute);font-weight:600}
  .ctag{font-size:8.5px;letter-spacing:1px;text-transform:uppercase;color:var(--cat);font-weight:600;opacity:.9}
  .cmain{font-size:31px;font-weight:600;line-height:1;margin:3px 0}
  .csub{font-size:11.5px;color:var(--faint);display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  .chip{font-size:11px;font-weight:600;font-family:var(--mono)}
  .chip.up{color:var(--pos)}.chip.down{color:var(--neg)}
  .persat{font-size:10px;color:var(--faint);margin-top:3px}
  .spark{margin-top:auto;width:100%;height:54px;position:relative;padding-top:8px}
  .card.tall .spark{flex:1;min-height:190px}
  canvas{display:block}
  .srow{display:flex;gap:16px;flex-wrap:wrap;margin-top:7px}
  .s{display:flex;flex-direction:column}
  .s .k{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.7px}
  .s .v{font-size:15px;font-weight:600}
  .blist{margin-top:8px;display:flex;flex-direction:column}
  .blk{display:flex;justify-content:space-between;font-size:11.5px;color:var(--faint);border-top:1px solid var(--line);padding:5px 0}
  .blk b{color:var(--ink);font-weight:600}.blk span:last-child{color:var(--mute)}
  .fees{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:6px}
  .fee{border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .fee .k{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.6px}
  .fee .v{font-size:17px;font-weight:600}.fee .v small{font-size:10px;color:var(--mute);font-family:var(--disp)}
  .rv{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .rvrow{display:flex;flex-direction:column;gap:4px}
  .rvtop{display:flex;justify-content:space-between;font-size:12px;color:var(--mute)}
  .rvtop b{color:var(--ink);font-weight:600}
  .rvbar{height:4px;background:var(--line);border-radius:3px;overflow:hidden}
  .rvbar i{display:block;height:100%;background:linear-gradient(90deg,var(--btc),#ffc06b);border-radius:3px;transition:width .4s}
  .stale{position:absolute;top:13px;right:14px;width:6px;height:6px;border-radius:50%;background:var(--neg);display:none}
  .card.is-stale .stale{display:block}
  .grip{position:absolute;bottom:11px;right:13px;color:var(--faint);font-size:11px;letter-spacing:1px;cursor:grab;opacity:0;transition:.15s}
  .card:hover .grip{opacity:.6}

  #focus{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.9);backdrop-filter:blur(6px);display:none;align-items:stretch;justify-content:center;padding:18px}
  #focus.on{display:flex}
  .fpanel{width:min(1080px,100%);background:var(--panel);border:1px solid var(--line2);border-radius:18px;padding:22px;display:flex;flex-direction:column}
  .fhead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
  .fhead h2{margin:0;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--cat);font-weight:600}
  .fbig{font-size:44px;font-weight:600;line-height:1;margin:9px 0 2px}
  .fclose{background:transparent;border:1px solid var(--line2);color:var(--mute);border-radius:9px;padding:8px 13px;cursor:pointer;font-family:var(--mono);font-size:12px}
  .fclose:hover{border-color:var(--btc);color:var(--ink)}
  .fctrl{display:flex;gap:8px}
  .finfo{width:34px;height:34px;border-radius:50%;background:transparent;border:1px solid var(--line2);color:var(--mute);cursor:pointer;font-family:Georgia,"Times New Roman",serif;font-style:italic;font-size:17px;font-weight:700;line-height:1}
  .finfo:hover,.finfo.on{border-color:var(--btc);color:var(--btc)}
  .finfopanel{flex:1;min-height:0;overflow:auto;padding-right:6px}
  .finfopanel .grp{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:1.4px;margin:0 0 12px}
  .finfopanel ul{margin:0;padding-left:18px;display:flex;flex-direction:column;gap:9px}
  .finfopanel li{font-size:13.5px;line-height:1.55;color:var(--ink)}
  .finfopanel li::marker{color:var(--btc)}
  .finfopanel li b{color:var(--btc);font-weight:600}
  .fbody{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px;margin-top:12px}
  .frange{display:flex;gap:6px}
  .frange button{background:transparent;border:1px solid var(--line2);color:var(--mute);border-radius:8px;padding:5px 13px;font-size:11px;cursor:pointer;font-family:var(--mono)}
  .frange button.on{border-color:var(--btc);color:var(--btc)}.frange button:hover{color:var(--ink)}
  .fchart{position:relative;flex:1;min-height:330px}
  .fnote{font-size:11.5px;color:var(--mute);line-height:1.5}

  footer{max-width:1520px;margin:0 auto;padding:14px 22px 30px;color:var(--faint);font-size:10.5px;line-height:1.7}
  a{color:var(--mute);text-decoration:none;border-bottom:1px solid var(--line2)}a:hover{color:var(--btc)}

  @media(max-width:1080px){.card{grid-column:span 6}.card.span8{grid-column:span 12}.card.span6{grid-column:span 6}}
  @media(max-width:660px){main{padding:12px}.grid{gap:10px}.card,.card.span6,.card.span8{grid-column:span 12}
    .cmain{font-size:27px}.fbig{font-size:33px}.legend{margin-left:0;width:100%}.hwrap{gap:8px;padding:11px 15px}.stat-pill{padding:5px 8px}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header><div class="hwrap">
  <div class="brand"><h1 class="wordmark">₿ITCOIN</h1></div>
  <div class="stat-pill"><span class="k">Block</span><span class="v num" style="color:var(--c-health)" id="h-block">—</span></div>
  <div class="stat-pill"><span class="k">Last block</span><span class="v num" id="h-since">—</span></div>
  <div class="stat-pill"><span class="k">Hashrate</span><span class="v num" style="color:var(--c-sec)" id="h-hash">—</span></div>
  <div class="stat-pill" id="pill-mcap"><span class="k">Market cap</span><span class="v num" style="color:var(--c-val)" id="h-mcap">—</span></div>
  <div class="stat-pill" id="pill-price"><span class="k">Price</span><span class="v num" style="color:var(--btc)" id="h-price">—</span></div>
  <div class="legend" id="legend">
    <button class="lg" data-cat="sec"><i style="background:var(--c-sec)"></i>security</button>
    <button class="lg" data-cat="health"><i style="background:var(--c-health)"></i>health</button>
    <button class="lg" data-cat="adopt"><i style="background:var(--c-adopt)"></i>adoption</button>
    <button class="lg" data-cat="val"><i style="background:var(--c-val)"></i>valuation</button>
    <button class="lg" data-cat="macro"><i style="background:var(--c-macro)"></i>macro</button>
    <button class="lg" data-card="price"><i style="background:var(--btc)"></i>price</button>
  </div>
  <div class="live"><span class="dot" id="h-dot"></span><span id="h-status">live</span></div>
</div></header>

<main><div class="grid" id="grid"></div></main>
<footer id="ftr"></footer>

<div id="focus"><div class="fpanel">
  <div class="fhead"><div><h2 id="f-title">—</h2><div class="fbig num" id="f-big">—</div><div class="csub" id="f-sub"></div></div>
    <div class="fctrl"><button class="finfo" id="f-info" title="What is this?">i</button><button class="fclose" id="f-close">esc</button></div></div>
  <div class="fbody"><div class="frange" id="f-range"></div><div class="fchart"><canvas id="f-canvas"></canvas></div><div class="fnote" id="f-note"></div><div class="finfopanel" id="f-infopanel" style="display:none"></div></div>
</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script>
"use strict";
/* ---- editable benchmarks (approx, slow-moving) ---- */
const BENCH=[["Gold",27e12],["Global wealth",470e12],["US M2",22e12],["S&P 500",52e12]];
const BTC_SUPPLY=19.92e6;

const $=s=>document.querySelector(s);
const GENESIS=Date.UTC(2009,0,3), now=()=>Date.now();
const ls={get(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};

function fmtUSD(n,d){if(n==null||isNaN(n))return"—";return"$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:d??0,minimumFractionDigits:d??0})}
function compact(n,p){if(n==null||isNaN(n))return"—";const a=Math.abs(n);
  if(a>=1e12)return(n/1e12).toFixed(p??2)+"T";if(a>=1e9)return(n/1e9).toFixed(p??2)+"B";
  if(a>=1e6)return(n/1e6).toFixed(p??2)+"M";if(a>=1e3)return(n/1e3).toFixed(p??1)+"K";
  return(+n).toLocaleString("en-US",{maximumFractionDigits:p??0})}
function fmtHash(h){if(h==null||isNaN(h))return"—";const u=["H","KH","MH","GH","TH","PH","EH","ZH"];let i=0,v=h;
  while(v>=1000&&i<u.length-1){v/=1000;i++}return v.toFixed(2)+" "+u[i]+"/s"}
function timeAgo(ms){if(ms==null)return"—";const s=Math.max(0,Math.floor((now()-ms)/1000));
  if(s<60)return s+"s";const m=Math.floor(s/60);if(m<60)return m+"m "+(s%60)+"s";const h=Math.floor(m/60);return h+"h "+(m%60)+"m"}
function dur(sec){if(sec==null||sec<0)return"—";sec=Math.floor(sec);const d=Math.floor(sec/86400),h=Math.floor(sec%86400/3600),m=Math.floor(sec%3600/60);
  if(d>0)return d+"d "+h+"h";if(h>0)return h+"h "+m+"m";return m+"m "+(sec%60)+"s"}
async function getJSON(url,ms=12000){const c=new AbortController(),t=setTimeout(()=>c.abort(),ms);
  try{const r=await fetch(url,{signal:c.signal,headers:{accept:"application/json"}});if(!r.ok)throw new Error(r.status);return await r.json()}finally{clearTimeout(t)}}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const PROXIES=[u=>u,u=>"https://api.codetabs.com/v1/proxy/?quest="+encodeURIComponent(u),u=>"https://corsproxy.io/?url="+encodeURIComponent(u),u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u)];
async function getText(url,ms=15000){const c=new AbortController(),t=setTimeout(()=>c.abort(),ms);
  try{const r=await fetch(url,{signal:c.signal});if(!r.ok)throw new Error(r.status);return await r.text()}finally{clearTimeout(t)}}
async function proxied(url,ms=15000){let e;for(const p of PROXIES){try{return await getJSON(p(url),ms)}catch(x){e=x}}throw e}
async function proxiedText(url,ms=15000){let e;for(const p of PROXIES){try{return await getText(p(url),ms)}catch(x){e=x}}throw e}
async function cg(url,ms=12000){try{return await getJSON(url,ms)}catch(e){await sleep(1600);return await getJSON(url,ms)}}
function parseCsv(text,scale){const out=[],lines=text.trim().split(/\r?\n/);
  for(let i=1;i<lines.length;i++){const parts=lines[i].split(",");if(parts.length<2)continue;
    const t=Date.parse(parts[0]),n=parseFloat(parts[1]);if(isNaN(t)||isNaN(n))continue;out.push({t,v:n*scale})}return out}

/* series stored as {t,v}; slice by days */
function sliceDays(s,days){if(!s||!s.length)return[];if(days==null)return s;const cut=now()-days*86400000;const r=s.filter(p=>p.t>=cut);return r.length>1?r:s.slice(-2)}
const vals=s=>s.map(p=>p.v);

Chart.defaults.font.family="IBM Plex Mono, monospace";Chart.defaults.color="#544e44";
const C={btc:"#f7931a",sec:"#f7931a",health:"#3fd0c9",adopt:"#ff8a00",val:"#8c8276",ink:"#f4efe7",line:"#191613",mute:"#544e44"};
const GOLD="#f7931a";
const MACRO="#b48ead";
function grad(ctx,area,col){if(!area)return col+"22";const g=ctx.createLinearGradient(0,area.top,0,area.bottom);g.addColorStop(0,col+"44");g.addColorStop(1,col+"00");return g}
function spark(cv,data,col){return new Chart(cv,{type:"line",data:{labels:data.map((_,i)=>i),
  datasets:[{data,borderColor:col,borderWidth:2,pointRadius:0,tension:.35,fill:true,backgroundColor:ctx=>grad(ctx.chart.ctx,ctx.chart.chartArea,col)}]},
  options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{enabled:false}},
    scales:{x:{display:false},y:{display:false,grace:"8%"}}}})}
function upsertSpark(id,data,col){const cv=$("#"+id);if(!cv)return;if(charts[id]){charts[id].data.datasets[0].data=data;charts[id].data.labels=data.map((_,i)=>i);charts[id].update("none")}else charts[id]=spark(cv,data,col)}
function upsert(cv,key,cfg){if(charts[key]){charts[key].data=cfg.data;charts[key].options=cfg.options;charts[key].update("none")}else charts[key]=new Chart(cv,cfg)}

const S={},charts={};
const CATS={sec:{l:"security",c:"var(--c-sec)"},health:{l:"health",c:"var(--c-health)"},adopt:{l:"adoption",c:"var(--c-adopt)"},val:{l:"valuation",c:"var(--c-val)"},macro:{l:"macro",c:"var(--c-macro)"}};
const METRICS=[
  {id:"power",  t:"Power Law",     cat:"val",   span:"span8", tall:true},
  {id:"hash",   t:"Hash Rate",     cat:"sec"},
  {id:"diff",   t:"Difficulty",    cat:"sec"},
  {id:"blocks", t:"Blocks",        cat:"health"},
  {id:"mempool",t:"Mempool",       cat:"health"},
  {id:"fees",   t:"Fees",          cat:"health"},
  {id:"tx",     t:"Transactions",  cat:"adopt"},
  {id:"addr",   t:"Addresses",     cat:"adopt"},
  {id:"ln",     t:"Lightning",     cat:"adopt"},
  {id:"nodes",  t:"Nodes",         cat:"adopt"},
  {id:"mcap",   t:"Market Cap",    cat:"val"},
  {id:"relval", t:"Relative Value",cat:"val"},
  {id:"btcgold",t:"Bitcoin in Gold",cat:"val"},
  {id:"m2",     t:"M2 Money Supply",cat:"macro"},
  {id:"debt",   t:"US Public Debt", cat:"macro"},
  {id:"gold",   t:"Gold",           cat:"macro"},
  {id:"sp500",  t:"S&P 500",        cat:"macro"},
  {id:"price",  t:"Price",         cat:"val"},
];

const grid=$("#grid");
let ordered=METRICS.slice();const ord=ls.get("btc-order");
if(ord)ordered.sort((a,b)=>{const i=ord.indexOf(a.id),j=ord.indexOf(b.id);return(i<0?99:i)-(j<0?99:j)});
for(const m of ordered){const c=document.createElement("div");
  c.className="card"+(m.span?" "+m.span:"")+(m.tall?" tall":"");c.dataset.id=m.id;c.style.setProperty("--cat",CATS[m.cat].c);
  c.innerHTML=`<span class="stale"></span><div class="chead"><span class="ctitle">${m.t}</span><span class="ctag">${CATS[m.cat].l}</span></div><div class="cbody" id="b-${m.id}"></div><span class="grip">⠿</span>`;
  c.addEventListener("click",e=>{if(e.target.closest(".grip"))return;openFocus(m.id)});grid.appendChild(c)}
new Sortable(grid,{animation:150,handle:".grip",ghostClass:"sortable-ghost",chosenClass:"sortable-chosen",onEnd(){ls.set("btc-order",[...grid.children].map(c=>c.dataset.id))}});

const body=id=>$("#b-"+id),card=id=>grid.querySelector(`.card[data-id="${id}"]`);
function setStale(id,b){const c=card(id);if(c)c.classList.toggle("is-stale",!!b)}

/* ---- category + card visibility (price hidden by default) ---- */
const DEF_HID_CARDS=[];
let hidCats=new Set(ls.get("btc-hidcats")||[]);
let hidCards=new Set(ls.get("btc-hidcards")||DEF_HID_CARDS);
function applyVis(){
  for(const m of METRICS){const c=card(m.id);if(!c)continue;c.style.display=(!hidCats.has(m.cat)&&!hidCards.has(m.id))?"":"none"}
  document.querySelectorAll(".lg").forEach(b=>{const cat=b.dataset.cat,cd=b.dataset.card;
    if(cat)b.classList.toggle("off",hidCats.has(cat));if(cd)b.classList.toggle("off",hidCards.has(cd))})}
document.querySelectorAll(".lg").forEach(b=>b.addEventListener("click",()=>{
  const cat=b.dataset.cat,cd=b.dataset.card;
  if(cat){hidCats.has(cat)?hidCats.delete(cat):hidCats.add(cat);ls.set("btc-hidcats",[...hidCats])}
  if(cd){hidCards.has(cd)?hidCards.delete(cd):hidCards.add(cd);ls.set("btc-hidcards",[...hidCards])}
  applyVis()}));

/* ---- power law ---- */
function plModel(d){return Math.pow(10,5.82*Math.log10(d)-17.01)}
function daysSince(ts){return Math.max(1,(ts-GENESIS)/86400000)}
function drawPowerChart(cv,key,big){const hist=S.priceHist;if(!hist||!hist.length)return;
  const model=[],sup=[],res=[];
  for(const p of hist){const d=daysSince(p.t),f=plModel(d);model.push({x:d,y:f});sup.push({x:d,y:f*0.501});res.push({x:d,y:f*1.995})}
  const lastD=daysSince(hist[hist.length-1].t);
  for(let k=1;k<=18;k++){const d=lastD+k*30,f=plModel(d);model.push({x:d,y:f});sup.push({x:d,y:f*0.501});res.push({x:d,y:f*1.995})}
  const actual=hist.map(p=>({x:daysSince(p.t),y:p.v}));
  const ds=[
    {label:"resistance",data:res,borderColor:C.btc+"66",borderWidth:1,borderDash:[5,4],pointRadius:0,fill:"+2",backgroundColor:"rgba(247,147,26,.06)"},
    {label:"fair value",data:model,borderColor:C.btc,borderWidth:2,pointRadius:0,fill:false},
    {label:"support",data:sup,borderColor:C.btc+"66",borderWidth:1,borderDash:[5,4],pointRadius:0,fill:false},
    {label:"price",data:actual,borderColor:C.ink,borderWidth:big?2:1.6,pointRadius:0,fill:false}];
  upsert(cv,key,{type:"line",data:{datasets:ds},options:{responsive:true,maintainAspectRatio:false,animation:false,
    plugins:{legend:{display:big,labels:{boxWidth:9,font:{size:10}}},
      tooltip:{enabled:big,callbacks:{title:i=>"day "+Math.round(i[0].parsed.x).toLocaleString(),label:i=>i.dataset.label+": "+fmtUSD(i.parsed.y)}}},
    scales:{x:{type:"logarithmic",grid:{color:C.line},ticks:{color:C.mute,maxTicksLimit:6}},
      y:{type:"logarithmic",grid:{color:C.line},ticks:{color:C.mute,callback:v=>{const l=Math.log10(v);return l===Math.round(l)?"$"+compact(v,0):""}}}}}})}

  getJSON("https://mempool.space/api/blocks/tip/height").then(h=>{S.tip=+h;setStale("blocks",false)}).catch(()=>setStale("blocks",true)),
  getJSON("https://mempool.space/api/v1/blocks").then(b=>{S.recentBlocks=b;if(b[0])S.lastBlockMs=b[0].timestamp*1000}).catch(()=>{}),
  getJSON("https://mempool.space/api/v1/difficulty-adjustment").then(a=>{S.diffAdj=a;setStale("diff",false)}).catch(()=>setStale("diff",true)),
  getJSON("https://mempool.space/api/v1/fees/recommended").then(f=>{S.fees=f;setStale("fees",false)}).catch(()=>setStale("fees",true)),
  getJSON("https://mempool.space/api/mempool").then(m=>{S.mp=m;setStale("mempool",false)}).catch(()=>setStale("mempool",true)),

]);rBlocks();rDiff();rFees();rMempool();rLN()}

function parseCsvCol(text,col,scale){const out=[],lines=text.trim().split(/\r?\n/);
  for(let i=1;i<lines.length;i++){const p=lines[i].split(",");if(p.length<=col)continue;const t=Date.parse(p[0]),n=parseFloat(p[col]);if(isNaN(t)||isNaN(n))continue;out.push({t,v:n*(scale||1)})}return out}
async function cbCandles(product,chunks){let all=[],end=new Date();
  for(let c=0;c<(chunks||1);c++){const start=new Date(end.getTime()-300*864e5);
    try{const d=await getJSON(`https://api.exchange.coinbase.com/products/${product}/candles?granularity=86400&start=${start.toISOString()}&end=${end.toISOString()}`);
      all=d.map(r=>({t:r[0]*1000,v:r[4]})).concat(all)}catch(e){}
    end=new Date(start.getTime()-864e5);await sleep(250)}
  all.sort((a,b)=>a.t-b.t);const seen=new Set(),out=[];for(const p of all){const k=Math.floor(p.t/864e5);if(!seen.has(k)){seen.add(k);out.push(p)}}return out}
async function pullMarketData(){
  const [gold,btc]=await Promise.all([cbCandles("PAXG-USD",3),cbCandles("BTC-USD",3)]);
  if(gold.length){S.goldHist=gold;rGold()}
  if(gold.length&&btc.length){const m=new Map();for(const p of btc)m.set(Math.floor(p.t/864e5),p.v);
    S.btcGold=gold.map(g=>{const b=m.get(Math.floor(g.t/864e5));return b?{t:g.t,v:b/g.v}:null}).filter(Boolean);rBtcGold()}}

async function pullDebt(){
  try{const d=await getJSON("https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v2/accounting/od/debt_to_penny?fields=record_date,tot_pub_debt_out_amt&sort=-record_date&page[size]=9000",20000);
    const rows=(d.data||[]).map(r=>({t:Date.parse(r.record_date),v:+r.tot_pub_debt_out_amt})).filter(r=>!isNaN(r.t)&&!isNaN(r.v)).sort((a,b)=>a.t-b.t);
    if(rows.length){S.debtNow=rows[rows.length-1];
      const monthly=[];let key=null;for(const r of rows){const k=new Date(r.t).getUTCFullYear()*12+new Date(r.t).getUTCMonth();if(k!==key){monthly.push(r);key=k}}
      if(monthly[monthly.length-1]!==rows[rows.length-1])monthly.push(rows[rows.length-1]);
      S.debtSeries=monthly;setStale("debt",false)}}
  catch(e){setStale("debt",true)}
  rDebt()}

/* ---- 1s heartbeat ---- */
function tick(){
  if(S.price&&S.priceDisplay!=null){const t=S.price.usd,diff=t-S.priceDisplay;S.priceDisplay+=diff*0.25;if(Math.abs(diff)<0.5)S.priceDisplay=t;$("#h-price").textContent=fmtUSD(S.priceDisplay,0);rPrice()}
  if(S.tip!=null)$("#h-block").textContent="#"+S.tip.toLocaleString();
  if(S.mcap!=null)$("#h-mcap").textContent="$"+compact(S.mcap,2);
  if(S.hashCurrent!=null)$("#h-hash").textContent=fmtHash(S.hashCurrent);
  if(S.lastBlockMs){$("#h-since").textContent=timeAgo(S.lastBlockMs);const e=$("#blk-since");if(e)e.textContent=timeAgo(S.lastBlockMs)}
  if(S.diffAdj){const a=S.diffAdj,eta=a.estimatedRetargetDate?Math.floor((a.estimatedRetargetDate-now())/1000):null,e=$("#diff-eta");if(e&&eta!=null)e.textContent=dur(eta)}
  if(S.recentBlocks&&!document.hidden)rBlocks();
  const st=$("#h-status");if(!netOK)st.textContent="reconnecting";else if(S.lastUpdate){const s=Math.round((now()-S.lastUpdate)/1000);st.textContent="updated "+(s<60?s+"s":Math.floor(s/60)+"m")+" ago"}
  if(!netOK&&now()-lastErr>20000)flag(true)}
