  .ctitle { font-weight: 700; font-size: .95rem; margin-bottom: .15rem; }

const cats = ["All",...new Set(data.flatMap(d=>d.cats))];
let active="All", open=null;

function render() {
  const q=(document.getElementById('search').value||'').toLowerCase();
  const f=data.filter(d=>{
    const mc=active==="All"||d.cats.includes(active);
    const mq=!q||d.title.toLowerCase().includes(q)||d.sub.toLowerCase().includes(q)||d.tags.some(t=>t.includes(q))||d.body.toLowerCase().includes(q);
    return mc&&mq;
  });
  document.getElementById('count').textContent=`${f.length} resource${f.length!==1?'s':''} found`;
  const res=document.getElementById('results');
  if(!f.length){res.innerHTML='<div class="empty">🔭 No results — try a different search or category.</div>';return;}
  res.innerHTML=f.map((d,i)=>`
    <div class="card" onclick="tog(${i})" style="animation-delay:${i*.03}s">
      <div class="ctop">
        <div class="cicon">${d.icon}</div>
        <div>
          <div class="ctitle">${d.title}</div>
          <div class="csub">${d.sub}</div>
          <div class="ctags">${d.tags.slice(0,5).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>
      <div class="cbody ${open===i?'open':''}">${d.body}
        ${d.links.length?`<div class="links">${d.links.map(l=>`<a class="lnk" href="${l[1]}" target="_blank" onclick="event.stopPropagation()">${l[0]}</a>`).join('')}</div>`:''}
      </div>
    </div>
  `).join('');
}

function tog(i){open=open===i?null:i;render();}

const pw=document.getElementById('pills');
cats.forEach(c=>{
  const el=document.createElement('div');
  el.className='pill'+(c==='All'?' active':'');
  el.textContent=c;
  el.onclick=()=>{
    active=c;open=null;
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    el.classList.add('active');
    render();
  };
  pw.appendChild(el);
});
render();
</script>
